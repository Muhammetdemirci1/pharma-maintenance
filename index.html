<script>
const SB_URL='https://pknjdbbzkbxilyjxgxpd.supabase.co';
const SB_KEY='sb_publishable_YNi3qSnLyM-ZVlE1TckyNg_QkuZqt1b';
// Döviz kurları — başlangıçta sabit, API'den güncellenince dinamik
let DKUR={EUR:1,USD:0.861,TRY:0.0195,CHF:1.107};
let kurTarihi='';

async function kurGuncelle(){
  try{
    // EUR bazlı kurları çek (EUR=1 olarak)
    const r=await fetch('https://api.exchangerate-api.com/v4/latest/EUR');
    const d=await r.json();
    if(d && d.rates){
      DKUR={
        EUR:1,
        USD: 1/d.rates.USD,   // 1 USD = ? EUR
        TRY: 1/d.rates.TRY,   // 1 TRY = ? EUR
        CHF: 1/d.rates.CHF    // 1 CHF = ? EUR
      };
      kurTarihi=d.date||'';
      // Kur göstergesini güncelle
      var el=document.getElementById('kur-bilgi');
      if(el){
        el.innerHTML='<span style="color:var(--green)">● Kurlar güncellendi: '+kurTarihi+'</span>'
          +' &nbsp;|&nbsp; $1=€'+DKUR.USD.toFixed(4)
          +' &nbsp;|&nbsp; ₺1=€'+DKUR.TRY.toFixed(6)
          +' &nbsp;|&nbsp; Fr1=€'+DKUR.CHF.toFixed(4);
      }
      console.log('Kurlar güncellendi:', DKUR);
    }
  }catch(e){
    console.log('Kur güncellenemedi, sabit kurlar kullanılıyor:', e);
    var el=document.getElementById('kur-bilgi');
    if(el) el.innerHTML='<span style="color:var(--gold)">● Sabit kurlar kullanılıyor</span>';
  }
}
const HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

async function sbGet(t,q=''){const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{headers:HDR});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbInsert(t,d){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{...HDR,'Prefer':'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbUpdate(t,id,d){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:{...HDR,'Prefer':'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbDelete(t,id){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:HDR});if(!r.ok)throw new Error(await r.text());}

let parcalar=[],siparisler=[],hareketler=[],stokSearch='';


function pbSembol(pb){ return {EUR:'€',USD:'$',TRY:'₺',CHF:'Fr'}[pb]||pb; }
function fiyatGoster(p){
  var pb=p.pb||'EUR';
  var giris=p.birim_fiyat_giris||p.birim_fiyat||0;
  var sembol=pbSembol(pb);
  var orijinal=sembol+Number(giris).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(pb==='EUR') return orijinal;
  var eurStr='<span style="font-size:10px;color:var(--text3);display:block">≈'+eur(p.birim_fiyat)+'</span>';
  return orijinal+eurStr;
}

async function bildirimIzniAl(){
  if(!('Notification' in window)) return false;
  if(Notification.permission === 'granted') return true;
  var izin = await Notification.requestPermission();
  return izin === 'granted';
}

function bildirimGonder(baslik, mesaj, kritiklik){
  if(Notification.permission !== 'granted') return;
  var icon = kritiklik === 'acil' ? '🔴' : '⚠️';
  new Notification(icon + ' StokTakip — ' + baslik, {
    body: mesaj,
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%230f172a"/><text x="16" y="23" text-anchor="middle" font-size="20" fill="%2310b981">⚙</text></svg>'
  });
}

async function kritikStokKontrol(){
  var izin = await bildirimIzniAl();
  if(!izin) return;
  
  parcalar.forEach(function(p){
    var m = mevcut(p.kod);
    var min = p.min_stok || 1;
    
    if(m <= 0){
      bildirimGonder(
        p.kod + ' — ' + p.ad,
        'Stok tamamen tükendi! Acil sipariş gerekiyor.',
        'acil'
      );
    } else if(m <= min){
      bildirimGonder(
        p.kod + ' — ' + p.ad,
        'Stok kritik seviyede! Mevcut: ' + m + ' / Min: ' + min,
        'uyari'
      );
    }
  });
}

function mevcut(kod){
  const p=parcalar.find(x=>x.kod===kod);if(!p)return 0;
  let s=Number(p.baslangic)||0;
  hareketler.filter(h=>h.par_kod===kod).forEach(h=>{
    if(h.tip==='GİRİŞ')s+=Number(h.miktar)||0;
    else if(h.tip==='ÇIKIŞ')s-=Number(h.miktar)||0;
    else if(h.tip==='DÜZELTME')s=Number(h.miktar)||0;
  });
  return Math.max(0,s);
}
function abcHesapla(){
  // Pareto bazlı ABC — toplam değerin %70/20/10
  const degerler = parcalar.map(p=>({kod:p.kod, deger:mevcut(p.kod)*p.birim_fiyat}));
  const toplamDeger = degerler.reduce((s,x)=>s+x.deger, 0);
  if(toplamDeger===0) return {};
  // Değere göre büyükten küçüğe sırala
  degerler.sort((a,b)=>b.deger-a.deger);
  const sonuc = {};
  let birikimli = 0;
  degerler.forEach(p=>{
    birikimli += p.deger;
    const pct = birikimli / toplamDeger;
    if(pct <= 0.70) sonuc[p.kod] = 'A';
    else if(pct <= 0.90) sonuc[p.kod] = 'B';
    else sonuc[p.kod] = 'C';
  });
  return sonuc;
}
function abc(f,kod){
  // Pareto hesabı — kod varsa oradan, yoksa fiyata göre fallback
  const tablo = abcHesapla();
  if(kod && tablo[kod]) return tablo[kod];
  return f>=500?'A':f>=50?'B':'C';
}
function durum(p){const m=mevcut(p.kod);if(m<=0)return{l:'TÜKENDİ',c:'badge-red'};if(m<=(p.min_stok||1))return{l:'KRİTİK',c:'badge-red'};if(m<=(p.min_stok||1)*1.5)return{l:'DÜŞÜK',c:'badge-gold'};return{l:'YETERLİ',c:'badge-green'};}
function fmt(n,d=0){return Number(n||0).toLocaleString('tr-TR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function eur(n){return '€'+fmt(n,2);}
function today(){return new Date().toISOString().slice(0,10);}

function updateBadge(){
  const n=parcalar.filter(p=>{
    const m=mevcut(p.kod);
    const talep=p.yillik_talep||1;
    const teslimat=p.teslimat||0;
    const ss=Math.max(1,Math.round(1.65*0.05*Math.sqrt(teslimat||14)));
    const rop=Math.max(1,Math.round((talep/365)*teslimat+ss));
    const abcSinif=abc(p.birim_fiyat,p.kod);
    return p.kritik||m<=(p.min_stok||1)||(m<=rop&&teslimat>0)||(teslimat>=30&&m<=ss)||(abcSinif==='A'&&m<=(p.min_stok||1)*2);
  }).length;
  const el=document.getElementById('kritik-badge');
  if(el){el.textContent=n;el.style.display=n?'':'none';}
}

async function saveParca(id){
  const g=x=>document.getElementById(x);
  const k=g('f-kod').value.trim().toUpperCase(),ad=g('f-ad').value.trim();
  if(!k||!ad){alert('Parça kodu ve adı zorunludur!');return;}
  const fg=parseFloat(g('f-fiyat').value)||0,pb=g('f-pb').value;
  const obj={kod:k,ad,kategori:g('f-kat').value,ekipman:g('f-ekp').value,birim_fiyat:fg*(DKUR[pb]||1),birim_fiyat_giris:fg,pb,birim:g('f-birim').value||'Adet',min_stok:parseInt(g('f-min').value)||0,baslangic:parseInt(g('f-bas').value)||0,tedarikci:g('f-ted').value,teslimat:parseInt(g('f-tes').value)||0,kritik:g('f-kritik').value==='1',notlar:g('f-not').value};
  try{
    if(id) await sbUpdate('parcalar',id,obj);
    else await sbInsert('parcalar',obj);
    // Fotoğraf varsa yükle
    var fotoInput = document.getElementById('f-foto');
    if(fotoInput && fotoInput.files && fotoInput.files[0]){
      await fotografYukle(fotoInput.files[0], obj.kod);
    }
    closeModal();
    await refreshAll('stok');
  }catch(e){alert('Hata: '+e.message);}
}

async function parcaSil(id,kod){
  if(!confirm(`"${kod}" silinsin mi?`))return;
  await sbDelete('parcalar',id);await refreshAll('stok');
}

function renderKritik(){
  document.getElementById('topbar-actions').innerHTML='<button class="btn" onclick="refreshAll(\'kritik\')">↻ Yenile</button>';

  function kritikBilgi(p){
    var m=mevcut(p.kod);
    var talep=p.yillik_talep||1;
    var teslimat=p.teslimat||0;
    var ss=Math.max(1,Math.round(1.65*0.05*Math.sqrt(teslimat||14)));
    var rop=Math.max(1,Math.round((talep/365)*teslimat+ss));
    var abcSinif=abc(p.birim_fiyat,p.kod);
    var nedenler=[];
    if(p.kritik) nedenler.push('Manuel');
    if(m<=0) nedenler.push('Tükendi');
    else if(m<=(p.min_stok||1)) nedenler.push('Min Stok Altı');
    if(teslimat>0 && m<=rop && m>(p.min_stok||1)) nedenler.push('ROP Altı');
    if(teslimat>=30 && m<=ss && m>(p.min_stok||1)) nedenler.push('Uzun Temin');
    if(abcSinif==='A' && m<=(p.min_stok||1)*2 && m>(p.min_stok||1)) nedenler.push('A Sınıfı Düşük');
    return {m:m, ss:ss, rop:rop, nedenler:nedenler, abcSinif:abcSinif};
  }

  var kl=parcalar.filter(function(p){
    var b=kritikBilgi(p);
    return b.nedenler.length>0;
  }).sort(function(a,b){return mevcut(a.kod)-mevcut(b.kod);});

  var rows=kl.map(function(p){
    var b=kritikBilgi(p);
    var m=b.m, rop=b.rop, nedenStr=b.nedenler.join(', ');
    var a=b.abcSinif;
    var ac=a==='A'?'badge-red':a==='B'?'badge-gold':'badge-gray';
    var stokRenk=m<=0?'var(--red)':m<=(p.min_stok||1)?'var(--gold)':'var(--green)';
    var durumCls=m<=0?'badge-red':m<=(p.min_stok||1)?'badge-red':'badge-gold';
    var durumLbl=m<=0?'ACİL SİPARİŞ':m<=(p.min_stok||1)?'KRİTİK':'UYARI';
    return '<tr>'
      +'<td style="color:var(--accent);font-weight:600">'+p.kod+'</td>'
      +'<td>'+p.ad+'</td>'
      +'<td style="color:var(--text3)">'+(p.ekipman||'-')+'</td>'
      +'<td><b style="color:'+stokRenk+'">'+m+'</b></td>'
      +'<td style="color:var(--text3)">'+(p.min_stok||0)+'</td>'
      +'<td style="color:var(--gold)">'+rop+'</td>'
      +'<td style="color:var(--gold)">'+eur(p.birim_fiyat)+'</td>'
      +'<td><span class="badge '+ac+'">'+a+'</span></td>'
      +'<td style="color:var(--text3)">'+(p.tedarikci||'-')+'</td>'
      +'<td style="color:var(--text3)">'+(p.teslimat||'-')+' gün</td>'
      +'<td><span class="badge badge-gold" style="font-size:9px">'+nedenStr+'</span></td>'
      +'<td><span class="badge '+durumCls+'">'+durumLbl+'</span></td>'
      +'<td><button class="btn btn-sm btn-primary" onclick="showSiparisModal(\''+p.kod+'\')">Sipariş Ver</button></td>'
      +'</tr>';
  }).join('');

  var alert_html=kl.length?'<div class="alert alert-danger">⚠ '+kl.length+' parça kritik seviyede.</div>':'';
  document.getElementById('content').innerHTML=alert_html
    +'<div class="card" style="padding:0;overflow:hidden">'
    +'<div class="table-wrap"><table>'
    +'<thead><tr>'
    +'<th>Kod</th><th>Parça Adı</th><th>Ekipman</th><th>Stok</th><th>Min</th><th>ROP</th>'
    +'<th>Fiyat</th><th>ABC</th><th>Tedarikçi</th><th>Teslimat</th>'
    +'<th>Neden Kritik</th><th>Durum</th><th>İşlem</th>'
    +'</tr></thead>'
    +'<tbody>'+(rows||'<tr><td colspan="13"><div class="empty">✅ Kritik parça yok!</div></td></tr>')+'</tbody>'
    +'</table></div></div>';
}

function renderEOQ(){
  document.getElementById('topbar-actions').innerHTML=`<button class="btn" onclick="refreshAll('eoq')">↻ Yenile</button>`;
  const rows=parcalar.map(p=>{
    const t=p.yillik_talep||1,sm=p.siparis_maliyet||50,I=p.birim_fiyat*0.25;
    const eoq=I>0?Math.max(1,Math.round(Math.sqrt(2*t*sm/I))):1;
    const ss=Math.max(1,Math.round(1.65*0.05*Math.sqrt(p.teslimat||14)));
    const rop=Math.max(1,Math.round((t/365)*(p.teslimat||14)+ss));
    const topM=sm*(t/eoq)+I*(eoq/2);
    return`<tr><td style="color:var(--accent);font-weight:600">${p.kod}</td><td>${p.ad.length>28?p.ad.slice(0,28)+'…':p.ad}</td><td style="color:var(--gold)">${eur(p.birim_fiyat)}</td><td><input type="number" value="${t}" min="0.1" step="0.5" style="width:65px;background:var(--bg);border:1px solid var(--green);color:var(--green);padding:4px 6px;border-radius:6px;font-size:11px;font-weight:600" onchange="updateEOQ('${p.id}','yillik_talep',this.value)"></td><td><input type="number" value="${sm}" min="1" style="width:65px;background:var(--bg);border:1px solid var(--green);color:var(--green);padding:4px 6px;border-radius:6px;font-size:11px;font-weight:600" onchange="updateEOQ('${p.id}','siparis_maliyet',this.value)"></td><td style="color:var(--text3)">${p.teslimat||14}</td><td><b style="color:var(--accent)">${eoq}</b></td><td style="color:var(--gold)">${ss}</td><td><b style="color:var(--gold)">${rop}</b></td><td style="color:var(--text3)">${(t/eoq).toFixed(1)}x/yıl</td><td style="color:var(--green)">${eur(topM)}</td></tr>`;
  }).join('');
  document.getElementById('content').innerHTML=`<div class="alert alert-warning">Yeşil hücreler düzenlenebilir — değiştirince otomatik kaydedilir.</div><div class="card" style="padding:0;overflow:hidden"><div class="table-wrap"><table><thead><tr><th>Kod</th><th>Parça Adı</th><th>Birim Fiyat</th><th style="color:var(--green)">Yıllık Talep</th><th style="color:var(--green)">Sipariş Maliyet (€)</th><th>Temin (gün)</th><th>EOQ</th><th>Güv.Stok</th><th>ROP</th><th>Sipariş/Yıl</th><th>Yıllık Maliyet</th></tr></thead><tbody>${rows||'<tr><td colspan="11"><div class="empty">Önce parça ekleyin</div></td></tr>'}</tbody></table></div></div>`;
}

async function updateEOQ(id,alan,val){
  const p=parcalar.find(x=>x.id===id);
  if(p){p[alan]=parseFloat(val)||0;await sbUpdate('parcalar',id,{[alan]:p[alan]});}
}

function renderSiparis(){
  document.getElementById('topbar-actions').innerHTML=`<button class="btn" onclick="refreshAll('siparis')">↻ Yenile</button><button class="btn btn-primary" onclick="showSiparisModal()">+ Yeni Sipariş</button>`;
  const bek=siparisler.filter(s=>s.durum==='Beklemede').length,kar=siparisler.filter(s=>s.durum==='Kargoda').length,tam=siparisler.filter(s=>s.durum==='Tamamlandı').length;
  const topT=siparisler.reduce((s,x)=>s+(x.tutar||0),0);
  const rows=siparisler.map(s=>{const p=parcalar.find(x=>x.kod===s.par_kod)||{};const dc=s.durum==='Tamamlandı'?'badge-green':s.durum==='Kargoda'?'badge-blue':s.durum==='İptal'?'badge-gray':'badge-gold';return`<tr><td style="color:var(--accent);font-weight:600">${s.sip_no}</td><td style="color:var(--accent)">${s.par_kod}</td><td>${p.ad||s.par_ad||'-'}</td><td style="color:var(--text3)">${p.tedarikci||'-'}</td><td><b>${s.miktar}</b></td><td style="color:var(--gold)">${eur(s.tutar)}</td><td style="color:var(--text3)">${s.sip_tarih||'-'}</td><td style="color:var(--text3)">${s.tes_tarih||'-'}</td><td><span class="badge ${dc}">${s.durum}</span></td><td style="white-space:nowrap"><select style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:11px;cursor:pointer" onchange="updSipDurum('${s.id}',this.value)"><option ${s.durum==='Beklemede'?'selected':''}>Beklemede</option><option ${s.durum==='Kargoda'?'selected':''}>Kargoda</option><option ${s.durum==='Tamamlandı'?'selected':''}>Tamamlandı</option><option ${s.durum==='İptal'?'selected':''}>İptal</option></select> <button class="btn btn-sm btn-danger" onclick="sipSil('${s.id}')">Sil</button></td></tr>`;}).join('');
  document.getElementById('content').innerHTML=`<div class="grid-4"><div class="kpi"><div class="kpi-label">Beklemede</div><div class="kpi-value" style="color:var(--gold)">${bek}</div></div><div class="kpi"><div class="kpi-label">Kargoda</div><div class="kpi-value" style="color:var(--accent)">${kar}</div></div><div class="kpi"><div class="kpi-label">Tamamlanan</div><div class="kpi-value" style="color:var(--green)">${tam}</div></div><div class="kpi"><div class="kpi-label">Toplam Tutar</div><div class="kpi-value" style="color:var(--gold)">${eur(topT)}</div></div></div><div class="card" style="padding:0;overflow:hidden"><div class="table-wrap"><table><thead><tr><th>Sipariş No</th><th>Parça Kodu</th><th>Parça Adı</th><th>Tedarikçi</th><th>Miktar</th><th>Tutar</th><th>Sipariş Tarihi</th><th>Tahmini Teslimat</th><th>Durum</th><th>İşlem</th></tr></thead><tbody>${rows||'<tr><td colspan="10"><div class="empty">Henüz sipariş yok</div></td></tr>'}</tbody></table></div></div>`;
}

function showSiparisModal(ok){
  const sn='SIP-'+String(siparisler.length+1).padStart(4,'0');
  const sec=parcalar.map(p=>`<option value="${p.kod}" ${p.kod===ok?'selected':''}>${p.kod} — ${p.ad}</option>`).join('');
  document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" ><div class="modal"><div class="modal-title">Yeni Sipariş</div><div class="form-grid"><div class="form-group"><label>Sipariş No</label><input id="s-no" value="${sn}" readonly></div><div class="form-group"><label>Parça *</label><select id="s-par" onchange="sipParDeg()">${sec||'<option>Önce parça ekleyin</option>'}</select></div><div class="form-group"><label>Miktar *</label><input id="s-mik" type="number" min="1" value="1"></div><div class="form-group"><label>Birim Fiyat (€)</label><input id="s-fiy" type="number" step="0.01"></div><div class="form-group"><label>Sipariş Tarihi</label><input id="s-sip" type="date" value="${today()}"></div><div class="form-group"><label>Tahmini Teslimat</label><input id="s-tes" type="date"></div></div><div class="form-group" style="margin-top:12px"><label>Notlar</label><textarea id="s-not" rows="2" style="resize:none"></textarea></div><div class="modal-footer"><button class="btn" onclick="closeModal()">İptal</button><button class="btn btn-primary" onclick="saveSip()">Kaydet</button></div></div></div>`;
  sipParDeg();
}

function sipParDeg(){const s=document.getElementById('s-par');if(!s)return;const p=parcalar.find(x=>x.kod===s.value);if(p){const f=document.getElementById('s-fiy');if(f&&!f.value)f.value=p.birim_fiyat.toFixed(2);}}

async function saveSip(){
  const pk=document.getElementById('s-par').value,mik=parseInt(document.getElementById('s-mik').value)||1;
  const p=parcalar.find(x=>x.kod===pk),fiy=parseFloat(document.getElementById('s-fiy').value)||p?.birim_fiyat||0;
  if(!pk){alert('Parça seçin!');return;}
  try{await sbInsert('siparisler',{sip_no:document.getElementById('s-no').value,par_kod:pk,par_ad:p?.ad||'',miktar:mik,tutar:mik*fiy,sip_tarih:document.getElementById('s-sip').value||null,tes_tarih:document.getElementById('s-tes').value||null,durum:'Beklemede',notlar:document.getElementById('s-not').value});closeModal();await refreshAll('siparis');}catch(e){alert('Hata: '+e.message);}
}

async function updSipDurum(id,d){await sbUpdate('siparisler',id,{durum:d});const s=siparisler.find(x=>x.id===id);if(s)s.durum=d;}
async function sipSil(id){if(!confirm('Siparişi silmek istediğinize emin misiniz?'))return;await sbDelete('siparisler',id);await refreshAll('siparis');}

function renderHareket(){

  document.getElementById('content').innerHTML=`<div class="card" style="padding:0;overflow:hidden"><div class="table-wrap"><table><thead><tr><th>Tarih</th><th>Parça Kodu</th><th>Parça Adı</th><th>Kullanan</th><th>Tip</th><th>Miktar</th><th>İş Emri</th><th>Açıklama</th><th>İşlem</th></tr></thead><tbody>${rows||'<tr><td colspan="9"><div class="empty">Henüz hareket kaydı yok</div></td></tr>'}</tbody></table></div></div>`;
}

function showHareketModal(ok){
  const sec=parcalar.map(p=>`<option value="${p.kod}" ${p.kod===ok?'selected':''}>${p.kod} — ${p.ad} (Stok: ${mevcut(p.kod)})</option>`).join('');
  document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" ><div class="modal"><div class="modal-title">Stok Hareketi Ekle</div><div class="form-grid"><div class="form-group"><label>Parça *</label><select id="h-par">${sec||'<option>Önce parça ekleyin</option>'}</select></div><div class="form-group"><label>Hareket Tipi *</label><select id="h-tip"><option>GİRİŞ</option><option>ÇIKIŞ</option><option>DÜZELTME</option></select></div><div class="form-group"><label>Miktar *</label><input id="h-mik" type="number" min="1" value="1"></div><div class="form-group"><label>Tarih</label><input id="h-tar" type="date" value="${today()}"></div><div class="form-group"><label>Kullanan / Tedarikçi</label><input id="h-kul" placeholder="Ad Soyad"></div><div class="form-group"><label>İş Emri No</label><input id="h-ie" placeholder="IE-2026-001"></div></div><div class="form-group" style="margin-top:12px"><label>Açıklama</label><textarea id="h-ac" rows="2" style="resize:none"></textarea></div><div class="modal-footer"><button class="btn" onclick="closeModal()">İptal</button><button class="btn btn-primary" onclick="saveHar()">Kaydet</button></div></div></div>`;

async function saveHar(){

}

async function harSil(id){if(!confirm('Hareketi silmek istediğinize emin misiniz?'))return;await sbDelete('hareketler',id);await refreshAll('hareket');}

function renderRaporlar(){
  document.getElementById('topbar-actions').innerHTML=
    '<button class="btn" onclick="refreshAll(\'raporlar\')">↻ Yenile</button>'
    +'<button class="btn btn-primary" onclick="excelIndir()">⬇ Excel İndir</button>';

  // ── Aylık kullanım (ÇIKIŞ hareketleri) ──────────────────────
  var aylikKullanim={};
  hareketler.filter(function(h){return h.tip==='ÇIKIŞ';}).forEach(function(h){
    var ay=h.tarih?h.tarih.slice(0,7):'Bilinmiyor';
    var p=parcalar.find(function(x){return x.kod===h.par_kod;})||{};
    var deger=(Number(h.miktar)||0)*(p.birim_fiyat||0);
    if(!aylikKullanim[ay]) aylikKullanim[ay]={adet:0,deger:0};
    aylikKullanim[ay].adet+=Number(h.miktar)||0;
    aylikKullanim[ay].deger+=deger;
  });
  var aylar=Object.keys(aylikKullanim).sort();
  var maxAyDeger=Math.max.apply(null,aylar.map(function(a){return aylikKullanim[a].deger;})||[1]);

  // ── Tedarikçi bazlı harcama ──────────────────────────────────
  var tedHarcama={};
  parcalar.forEach(function(p){
    var ted=p.tedarikci||'Bilinmiyor';
    var deger=mevcut(p.kod)*p.birim_fiyat;
    tedHarcama[ted]=(tedHarcama[ted]||0)+deger;
  });
  var tedList=Object.entries(tedHarcama).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var maxTed=tedList[0]?tedList[0][1]:1;

  // ── Ekipman bazlı tüketim ────────────────────────────────────
  var ekpTuketim={};
  hareketler.filter(function(h){return h.tip==='ÇIKIŞ';}).forEach(function(h){
    var p=parcalar.find(function(x){return x.kod===h.par_kod;})||{};
    var ekp=p.ekipman||'Bilinmiyor';
    var deger=(Number(h.miktar)||0)*(p.birim_fiyat||0);
    if(!ekpTuketim[ekp]) ekpTuketim[ekp]={adet:0,deger:0};
    ekpTuketim[ekp].adet+=Number(h.miktar)||0;
    ekpTuketim[ekp].deger+=deger;
  });
  var ekpList=Object.entries(ekpTuketim).sort(function(a,b){return b[1].deger-a[1].deger;}).slice(0,8);
  var maxEkp=ekpList[0]?ekpList[0][1].deger:1;

  // ── ABC harcama ───────────────────────────────────────────────
  var abcHarc={A:{deger:0,say:0},B:{deger:0,say:0},C:{deger:0,say:0}};
  parcalar.forEach(function(p){
    var a=abc(p.birim_fiyat,p.kod);
    abcHarc[a].deger+=mevcut(p.kod)*p.birim_fiyat;
    abcHarc[a].say++;
  });
  var topAbcDeger=abcHarc.A.deger+abcHarc.B.deger+abcHarc.C.deger||1;

  // ── Toplam KPI ───────────────────────────────────────────────
  var toplamCikis=hareketler.filter(function(h){return h.tip==='ÇIKIŞ';}).reduce(function(s,h){
    var p=parcalar.find(function(x){return x.kod===h.par_kod;})||{};
    return s+(Number(h.miktar)||0)*(p.birim_fiyat||0);
  },0);
  var toplamGiris=hareketler.filter(function(h){return h.tip==='GİRİŞ';}).reduce(function(s,h){
    var p=parcalar.find(function(x){return x.kod===h.par_kod;})||{};
    return s+(Number(h.miktar)||0)*(p.birim_fiyat||0);
  },0);
  var toplamSiparis=siparisler.filter(function(s){return s.durum==='Tamamlandı';}).reduce(function(s,x){return s+(x.tutar||0);},0);

  document.getElementById('content').innerHTML=
    // KPI
    '<div class="grid-4" style="margin-bottom:16px">'
    +'<div class="kpi"><div class="kpi-label">Toplam Kullanım (€)</div><div class="kpi-value" style="color:var(--red)">'+eur(toplamCikis)+'</div><div class="kpi-sub">tüm zamanlar ÇIKIŞ</div></div>'
    +'<div class="kpi"><div class="kpi-label">Toplam Giriş (€)</div><div class="kpi-value" style="color:var(--green)">'+eur(toplamGiris)+'</div><div class="kpi-sub">tüm zamanlar GİRİŞ</div></div>'
    +'<div class="kpi"><div class="kpi-label">Tamamlanan Sipariş</div><div class="kpi-value" style="color:var(--gold)">'+eur(toplamSiparis)+'</div><div class="kpi-sub">tamamlanan siparişler</div></div>'
    +'<div class="kpi"><div class="kpi-label">Hareket Sayısı</div><div class="kpi-value" style="color:var(--accent)">'+hareketler.length+'</div><div class="kpi-sub">toplam kayıt</div></div>'
    +'</div>'

    // Aylık kullanım + Tedarikçi
    +'<div class="grid-2">'

    +'<div class="card"><div class="section-title">Aylık Stok Kullanımı (€)</div>'
    +(aylar.length?aylar.map(function(ay){
      var pct=maxAyDeger?Math.round(aylikKullanim[ay].deger/maxAyDeger*100):0;
      return '<div class="chart-bar-row">'
        +'<div class="chart-bar-label">'+ay+'</div>'
        +'<div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:var(--red)"></div></div>'
        +'<div class="chart-bar-val">'+eur(aylikKullanim[ay].deger)+'</div>'
        +'</div>';
    }).join(''):'<div class="empty">Henüz ÇIKIŞ hareketi yok</div>')
    +'</div>'

    +'<div class="card"><div class="section-title">Tedarikçi Bazlı Stok Değeri (€)</div>'
    +(tedList.length?tedList.map(function(e){
      var pct=maxTed?Math.round(e[1]/maxTed*100):0;
      return '<div class="chart-bar-row">'
        +'<div class="chart-bar-label">'+e[0]+'</div>'
        +'<div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:var(--accent)"></div></div>'
        +'<div class="chart-bar-val">'+eur(e[1])+'</div>'
        +'</div>';
    }).join(''):'<div class="empty">Henüz veri yok</div>')
    +'</div>'
    +'</div>'

    // Ekipman + ABC
    +'<div class="grid-2">'

    +'<div class="card"><div class="section-title">Ekipman Bazlı Parça Tüketimi (€)</div>'
    +(ekpList.length?ekpList.map(function(e){
      var pct=maxEkp?Math.round(e[1].deger/maxEkp*100):0;
      return '<div class="chart-bar-row">'
        +'<div class="chart-bar-label">'+e[0]+'</div>'
        +'<div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:var(--gold)"></div></div>'
        +'<div class="chart-bar-val">'+eur(e[1].deger)+' ('+e[1].adet+' adet)</div>'
        +'</div>';
    }).join(''):'<div class="empty">Henüz ÇIKIŞ hareketi yok</div>')
    +'</div>'

    +'<div class="card"><div class="section-title">ABC Sınıfına Göre Stok Değeri</div>'
    +['A','B','C'].map(function(k){
      var pct=Math.round(abcHarc[k].deger/topAbcDeger*100);
      var cl=k==='A'?'var(--red)':k==='B'?'var(--gold)':'var(--text3)';
      return '<div style="margin-bottom:14px">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:5px">'
        +'<span style="font-size:12px;color:var(--text2)">Sınıf <b style="color:'+cl+'">'+k+'</b> — '+abcHarc[k].say+' parça</span>'
        +'<span style="font-size:11px;color:var(--text3)">'+eur(abcHarc[k].deger)+' ('+pct+'%)</span>'
        +'</div>'
        +'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+cl+'"></div></div>'
        +'</div>';
    }).join('')
    +'</div>'
    +'</div>'

    // Aylık detay tablo
    +(aylar.length?
      '<div class="card" style="padding:0;overflow:hidden">'
      +'<div style="padding:14px 16px;border-bottom:1px solid var(--border)"><div class="section-title" style="margin:0">Aylık Detay</div></div>'
      +'<div class="table-wrap"><table>'
      +'<thead><tr><th>Ay</th><th>Kullanılan Adet</th><th>Kullanım Değeri (€)</th></tr></thead>'
      +'<tbody>'+aylar.map(function(ay){
        return '<tr>'
          +'<td style="color:var(--accent)">'+ay+'</td>'
          +'<td>'+aylikKullanim[ay].adet+' adet</td>'
          +'<td style="color:var(--red)">'+eur(aylikKullanim[ay].deger)+'</td>'
          +'</tr>';
      }).join('')+'</tbody>'
      +'</table></div></div>'
    :'');
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}

(async()=>{await loadAll();updateBadge();navigate('dashboard');})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
function excelIndir(){
  // SheetJS ile Excel oluştur
  if(typeof XLSX === 'undefined'){
    alert('Excel kütüphanesi yükleniyor, lütfen bekleyin...');
    return;
  }
  var wb = XLSX.utils.book_new();

  // 1. Stok Verileri sayfası
  var stokData = [['Parça Kodu','Parça Adı','Kategori','Ekipman','Mevcut Stok','Min Stok','Birim Fiyat (€)','Toplam Değer (€)','ABC','Tedarikçi','Teslimat (gün)','Kritik']];
  parcalar.forEach(function(p){
    var m=mevcut(p.kod);
    stokData.push([p.kod,p.ad,p.kategori||'',p.ekipman||'',m,p.min_stok||0,Number(p.birim_fiyat||0).toFixed(2),Number(m*p.birim_fiyat).toFixed(2),abc(p.birim_fiyat,p.kod),p.tedarikci||'',p.teslimat||0,p.kritik?'Evet':'Hayır']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(stokData), 'Stok Verileri');

  // 2. Kritik Parçalar sayfası
  var kritikData = [['Parça Kodu','Parça Adı','Ekipman','Stok','Min Stok','ROP','Birim Fiyat (€)','ABC','Tedarikçi','Teslimat (gün)','Neden Kritik','Durum']];
  parcalar.forEach(function(p){
    var m=mevcut(p.kod);
    var talep=p.yillik_talep||1, teslimat=p.teslimat||0;
    var ss=Math.max(1,Math.round(1.65*0.05*Math.sqrt(teslimat||14)));
    var rop=Math.max(1,Math.round((talep/365)*teslimat+ss));
    var abcS=abc(p.birim_fiyat,p.kod);
    var nedenler=[];
    if(p.kritik) nedenler.push('Manuel');
    if(m<=0) nedenler.push('Tükendi');
    else if(m<=(p.min_stok||1)) nedenler.push('Min Stok Altı');
    if(teslimat>0&&m<=rop&&m>(p.min_stok||1)) nedenler.push('ROP Altı');
    if(teslimat>=30&&m<=ss&&m>(p.min_stok||1)) nedenler.push('Uzun Temin');
    if(abcS==='A'&&m<=(p.min_stok||1)*2&&m>(p.min_stok||1)) nedenler.push('A Sınıfı Düşük');
    if(nedenler.length===0) return;
    var durum=m<=0?'ACİL SİPARİŞ':m<=(p.min_stok||1)?'KRİTİK':'UYARI';
    kritikData.push([p.kod,p.ad,p.ekipman||'',m,p.min_stok||0,rop,Number(p.birim_fiyat||0).toFixed(2),abcS,p.tedarikci||'',teslimat,nedenler.join(', '),durum]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(kritikData), 'Kritik Parçalar');

  // 3. Sipariş Takip sayfası
  var sipData = [['Sipariş No','Parça Kodu','Parça Adı','Tedarikçi','Miktar','Tutar (€)','Sipariş Tarihi','Tahmini Teslimat','Durum']];
  siparisler.forEach(function(s){
    var p=parcalar.find(function(x){return x.kod===s.par_kod;})||{};
    sipData.push([s.sip_no,s.par_kod,p.ad||s.par_ad||'',p.tedarikci||'',s.miktar,Number(s.tutar||0).toFixed(2),s.sip_tarih||'',s.tes_tarih||'',s.durum]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sipData), 'Sipariş Takip');

  // 4. Hareket Log sayfası
  var harData = [['Tarih','Parça Kodu','Parça Adı','Kullanan','Hareket Tipi','Miktar','İş Emri','Açıklama']];
  hareketler.forEach(function(h){
    var p=parcalar.find(function(x){return x.kod===h.par_kod;})||{};
    harData.push([h.tarih||'',h.par_kod,p.ad||'',h.kullanan||'',h.tip,h.miktar,h.i_emri||'',h.aciklama||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(harData), 'Hareket Log');

  // Dosyayı indir
  var tarih = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, 'StokTakip_Rapor_'+tarih+'.xlsx');
}
</script>

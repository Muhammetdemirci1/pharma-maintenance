<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNyIgZmlsbD0iIzExMTgyNyIvPgogIDx0ZXh0IHg9IjE2IiB5PSIyNCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1zaXplPSIyMiIgZmlsbD0iIzNiODJmNiI+8J+boDwvdGV4dD4KPC9zdmc+">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StokTakip — Yedek Parça Yönetim Sistemi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Sidebar — koyu */
  --sb-bg:#111827;
  --sb-hover:#1f2937;
  --sb-active:#1e3a5f;
  --sb-border:#1f2937;
  --sb-text:#9ca3af;
  --sb-text-active:#60a5fa;
  --sb-accent:#3b82f6;

  /* İçerik — açık */
  --bg:#f8fafc;
  --bg2:#ffffff;
  --bg3:#f1f5f9;
  --border:#e2e8f0;
  --border2:#cbd5e1;
  --text:#0f172a;
  --text2:#475569;
  --text3:#94a3b8;

  /* Semantic */
  --blue:#3b82f6;
  --blue-light:#eff6ff;
  --blue-mid:#bfdbfe;
  --green:#10b981;
  --green-light:#f0fdf4;
  --red:#ef4444;
  --red-light:#fef2f2;
  --gold:#f59e0b;
  --gold-light:#fffbeb;
  --purple:#8b5cf6;

  --radius:10px;
  --radius-sm:6px;
  --radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
}

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.5}

/* ── LAYOUT ────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ───────────────────────────────────── */
.sidebar{width:240px;background:var(--sb-bg);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--sb-border)}
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--sb-border)}
.logo-icon{width:44px;height:44px;background:var(--sb-accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px}
.logo-title{font-size:15px;font-weight:600;color:#f9fafb;letter-spacing:-0.01em}
.logo-sub{font-size:11px;color:var(--sb-text);margin-top:2px}

.nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:#4b5563;text-transform:uppercase;letter-spacing:0.08em;padding:12px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--sb-text);font-size:13px;font-weight:400;transition:all 0.15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--sb-hover);color:#e5e7eb}
.nav-item.active{background:var(--sb-active);color:var(--sb-text-active);font-weight:500}
.nav-icon{font-size:15px;width:20px;text-align:center;opacity:0.8}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600}

.conn-status{padding:12px 20px;border-top:1px solid var(--sb-border);font-size:11px;display:flex;align-items:center;gap:7px;color:var(--sb-text)}
.conn-dot{width:6px;height:6px;border-radius:50%;background:#374151;flex-shrink:0}
.conn-dot.ok{background:var(--green)}
.conn-dot.err{background:var(--red)}

/* ── MAIN ──────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

.topbar{padding:0 28px;height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);box-shadow:var(--shadow)}
.page-title{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-0.01em}
.topbar-actions{display:flex;gap:8px;align-items:center}

.content{flex:1;overflow-y:auto;padding:28px}

/* ── BUTTONS ───────────────────────────────────── */
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:var(--bg3);border-color:var(--border2);color:var(--text)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}
.btn-primary:hover{background:#2563eb;border-color:#2563eb}
.btn-danger{border-color:#fca5a5;color:var(--red);background:var(--red-light)}
.btn-danger:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text3)}
.btn-ghost:hover{background:var(--bg3);color:var(--text2);border-color:transparent}

/* ── CARDS ─────────────────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow)}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}

/* ── KPI CARDS ─────────────────────────────────── */
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;box-shadow:var(--shadow);transition:box-shadow 0.15s}
.kpi:hover{box-shadow:var(--shadow-md)}
.kpi-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:600;letter-spacing:-0.02em;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:6px}
.kpi-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px}
.kpi-icon.blue{background:var(--blue-light)}
.kpi-icon.green{background:var(--green-light)}
.kpi-icon.red{background:var(--red-light)}
.kpi-icon.gold{background:var(--gold-light)}

/* ── GRIDS ─────────────────────────────────────── */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}

/* ── SECTION TITLE ─────────────────────────────── */
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px}

/* ── TABLE ─────────────────────────────────────── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg3)}
th{text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8fafc}

/* ── BADGES ────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;letter-spacing:0.02em}
.badge-red{background:var(--red-light);color:#dc2626}
.badge-green{background:var(--green-light);color:#059669}
.badge-gold{background:var(--gold-light);color:#d97706}
.badge-blue{background:var(--blue-light);color:#2563eb}
.badge-gray{background:var(--bg3);color:var(--text3)}
.badge-purple{background:#f5f3ff;color:#7c3aed}

/* ── PROGRESS ──────────────────────────────────── */
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s}

/* ── CHART BARS ────────────────────────────────── */
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.chart-bar-label{font-size:11px;color:var(--text2);width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar-track{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:4px;transition:width 0.5s}
.chart-bar-val{font-size:11px;color:var(--text3);width:70px;text-align:right;flex-shrink:0}

/* ── FORMS ─────────────────────────────────────── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:500;color:var(--text2)}
.form-group input,.form-group select,.form-group textarea{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border 0.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.form-group select{cursor:pointer}

/* ── SEARCH ────────────────────────────────────── */
.search-wrap{position:relative;display:inline-flex;align-items:center}
.search-icon{position:absolute;left:10px;color:var(--text3);font-size:13px;pointer-events:none}
.search-bar{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:8px 12px 8px 32px;border-radius:var(--radius-sm);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:220px;transition:border 0.15s}
.search-bar:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}

/* ── MODAL ─────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s ease}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:600px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:slideUp .2s ease}
.modal-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}

/* ── ALERTS ────────────────────────────────────── */
.alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.alert-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.alert-warning{background:var(--gold-light);border:1px solid #fde68a;color:#92400e}
.alert-danger{background:var(--red-light);border:1px solid #fca5a5;color:#991b1b}
.alert-success{background:var(--green-light);border:1px solid #a7f3d0;color:#065f46}
.alert-info{background:var(--blue-light);border:1px solid var(--blue-mid);color:#1e40af}

/* ── MISC ──────────────────────────────────────── */
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:0.5}
.loading{text-align:center;padding:48px;color:var(--text3)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
.divider{height:1px;background:var(--border);margin:16px 0}
.mono{font-family:'DM Mono',monospace}

/* ── ANIMATIONS ────────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── LOGIN ─────────────────────────────────────── */
#LO{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;overflow:hidden}
#LO-bg{position:absolute;inset:0;background:#050d1a}
#LO-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 50%,rgba(30,58,138,.5) 0%,transparent 60%)}
#LO-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 80% 30%,rgba(6,78,59,.3) 0%,transparent 55%)}
.login-wrap{display:flex;width:900px;max-width:95vw;height:520px;max-height:95vh;border-radius:20px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.6);position:relative;z-index:1}
.login-left{flex:1;background:linear-gradient(145deg,#0f2647 0%,#0a1628 100%);padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.login-left::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;border-radius:50%;background:rgba(59,130,246,.06);pointer-events:none}
.login-left::after{content:'';position:absolute;bottom:-60px;left:-60px;width:200px;height:200px;border-radius:50%;background:rgba(16,185,129,.05);pointer-events:none}
.login-brand{position:relative;z-index:1}
.login-brand-icon{width:72px;height:72px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:20px;box-shadow:0 8px 24px rgba(59,130,246,.3)}
.login-brand-name{font-size:26px;font-weight:700;color:#f9fafb;letter-spacing:-.02em}
.login-brand-sub{font-size:12px;color:#6b7280;margin-top:6px;line-height:1.5}
.login-features{position:relative;z-index:1}
.login-feat{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.login-feat-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.login-feat-text{font-size:12px;color:#9ca3af}
.login-right{width:360px;background:#ffffff;padding:44px;display:flex;flex-direction:column;justify-content:center}
.login-right-title{font-size:20px;font-weight:700;color:#0f172a;margin-bottom:4px;letter-spacing:-.02em}
.login-right-sub{font-size:12px;color:#94a3b8;margin-bottom:28px}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.login-field input{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;color:#0f172a;padding:11px 14px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:all .15s}
.login-field input:focus{border-color:#3b82f6;background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.login-btn{width:100%;padding:12px;border-radius:8px;border:none;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-top:8px;letter-spacing:.01em}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(59,130,246,.35)}
.login-btn:active{transform:translateY(0)}
.login-err{background:#fef2f2;border:1.5px solid #fca5a5;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;display:none;text-align:center;font-weight:500}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:40px}
.pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;font-size:15px;padding:0;line-height:1}
.pass-eye:hover{color:#475569}
@media(max-width:640px){.login-wrap{flex-direction:column;height:auto}.login-left{padding:28px;min-height:180px}.login-features{display:none}.login-right{width:100%;padding:28px}}

/* ── SCROLLBAR ─────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── MOBILE ────────────────────────────────────── */
@media(max-width:768px){
  .app{flex-direction:column;height:auto;min-height:100vh}
  .sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--sb-border)}
  .logo{padding:14px 16px 12px;display:flex;align-items:center;gap:10px}
  .logo-icon{margin-bottom:0;width:28px;height:28px;font-size:14px}
  .logo-sub{display:none}
  .nav{display:flex;flex-direction:row;padding:6px 8px;gap:2px;overflow-x:auto}
  .nav-section{display:none}
  .nav-item{flex-direction:column;padding:8px 10px;font-size:9px;gap:3px;min-width:56px;justify-content:center;border-radius:6px}
  .nav-item.active{border-bottom:none}
  .conn-status{display:none}
  .content{padding:16px}
  .grid-4{grid-template-columns:1fr 1fr;gap:10px}
  .grid-2{grid-template-columns:1fr}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .modal{padding:20px}
  .form-grid{grid-template-columns:1fr}
  .search-bar{width:160px}
}
@media(max-width:480px){
  .grid-4{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="LO">
  <div id="LO-bg"></div>
  <div class="login-wrap">
    <div class="login-left">
      <div class="login-brand">
        <div class="login-brand-icon">🛠</div>
        <div class="login-brand-name">StokTakip</div>
        <div class="login-brand-sub" style="color:#cbd5e1;font-size:13px;line-height:1.7;margin-top:8px">Yedek Parça Yönetim Sistemi<br><span style="color:#94a3b8;font-size:11px">Biofarma İlaç San. ve Tic. A.Ş.</span></div>
      </div>
      <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none">
        <svg width="100%" height="100%" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <style>
              .geo-line{stroke:rgba(59,130,246,0.15);stroke-width:1;fill:none}
              .geo-dot{fill:rgba(59,130,246,0.3)}
              .geo-tri{stroke:rgba(16,185,129,0.12);stroke-width:1;fill:rgba(16,185,129,0.03)}
              .geo-hex{stroke:rgba(99,102,241,0.12);stroke-width:1;fill:none}
              @keyframes rotSlow{from{transform-origin:200px 200px;transform:rotate(0deg)}to{transform-origin:200px 200px;transform:rotate(360deg)}}
              @keyframes rotRev{from{transform-origin:200px 200px;transform:rotate(360deg)}to{transform-origin:200px 200px;transform:rotate(0deg)}}
              @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
              @keyframes pulse2{0%,100%{opacity:0.3}50%{opacity:0.8}}
              .ring1{animation:rotSlow 30s linear infinite}
              .ring2{animation:rotRev 20s linear infinite}
              .ring3{animation:rotSlow 45s linear infinite}
              .floater{animation:float 6s ease-in-out infinite}
              .floater2{animation:float 8s ease-in-out 2s infinite}
              .floater3{animation:float 5s ease-in-out 1s infinite}
              .pulser{animation:pulse2 3s ease-in-out infinite}
              .pulser2{animation:pulse2 4s ease-in-out 1.5s infinite}
            </style>
          </defs>

          <!-- Büyük çember halkaları -->
          <circle class="geo-line ring1" cx="200" cy="200" r="160"/>
          <circle class="geo-line ring2" cx="200" cy="200" r="120"/>
          <circle class="geo-line ring3" cx="200" cy="200" r="80"/>

          <!-- Izgara çizgiler -->
          <line class="geo-line" x1="0" y1="200" x2="400" y2="200" opacity="0.4"/>
          <line class="geo-line" x1="200" y1="0" x2="200" y2="400" opacity="0.4"/>
          <line class="geo-line" x1="0" y1="0" x2="400" y2="400" opacity="0.2"/>
          <line class="geo-line" x1="400" y1="0" x2="0" y2="400" opacity="0.2"/>

          <!-- Dönen altıgen -->
          <g class="ring1">
            <polygon class="geo-hex" points="200,60 254,90 254,150 200,180 146,150 146,90"/>
          </g>
          <g class="ring2">
            <polygon class="geo-hex" points="200,100 240,122 240,166 200,188 160,166 160,122"/>
          </g>

          <!-- Üçgenler -->
          <g class="floater">
            <polygon class="geo-tri" points="60,80 100,150 20,150"/>
          </g>
          <g class="floater2">
            <polygon class="geo-tri" points="320,60 360,130 280,130"/>
          </g>
          <g class="floater3">
            <polygon class="geo-tri" points="340,280 370,330 310,330"/>
          </g>
          <g class="floater">
            <polygon class="geo-tri" points="30,300 70,370 -10,370"/>
          </g>

          <!-- Nokta ızgarası -->
          <g class="pulser">

        'uyari'
      );
    }
  });
}

function mevcut(kod){
  const p=parcalar.find(x=>x.kod===kod);if(!p)return 0;
  let s=Number(p.baslangic)||0;
  hareketler.filter(h=>h.par_kod===kod).forEach(h=>{
    if(h.tip==='GİRİŞ')s+=Number(h.miktar)||0;
    else if(h.tip==='ÇIKIŞ')s-=Number(h.miktar)||0;
    else if(h.tip==='DÜZELTME')s=Number(h.miktar)||0;
  });
  return Math.max(0,s);
}
function abc(f,kod){
  // Birim fiyata göre sabit eşik:
  // A: ≥500€ — pahalı, kritik parçalar
  // B: 50-500€ — orta değerli
  // C: <50€ — ucuz, sarf malzeme
  var fiyat = f || 0;
  if(fiyat >= 500) return 'A';
  if(fiyat >= 50)  return 'B';
  return 'C';
}

function kritikBilgi(p){
    var m=mevcut(p.kod);
    var talep=p.yillik_talep||1;
    var teslimat=p.teslimat||0;
    var ss=Math.max(1,Math.round(2.33*0.20*Math.sqrt(teslimat||14)));
    var rop=Math.max(1,Math.round((talep/365)*teslimat+ss));
    var abcSinif=abc(p.birim_fiyat,p.kod);

    // KRİTİK PARÇA KRİTERLERİ:
    // 1. ABC sınıfı A (yüksek değerli, pahalı)
    // 2. Temin süresi ≥ 30 gün (uzun bekleme süresi)
    var nedenler=[];
    if(abcSinif==='A') nedenler.push('Sınıf A');
    if(teslimat>=30) nedenler.push('Uzun Temin ('+teslimat+' gün)');

    return {m:m, ss:ss, rop:rop, nedenler:nedenler, abcSinif:abcSinif};
  }

  ${sonH.length?`<div class="table-wrap"><table><thead><tr><th>Tarih</th><th>Parça Kodu</th><th>Parça Adı</th><th>Tip</th><th>Miktar</th><th>Açıklama</th></tr></thead><tbody>${sonH.map(h=>{const p=parcalar.find(x=>x.kod===h.par_kod)||{};const cl=h.tip==='GİRİŞ'?'badge-green':h.tip==='ÇIKIŞ'?'badge-red':'badge-blue';return`<tr><td style="color:var(--text3)">${h.tarih||''}</td><td style="color:var(--accent);font-weight:600">${h.par_kod}</td><td>${p.ad||'-'}</td><td><span class="badge ${cl}">${h.tip}</span></td><td><b>${h.miktar}</b></td><td style="color:var(--text3)">${h.aciklama||'-'}</td></tr>`;}).join('')}</tbody></table></div>`:'<div class="empty">Henüz hareket kaydı yok</div>'}
</div>`;

  // ── ACİL SİPARİŞ GEREKTİRENLER (COMPACT) ──────────────────
  var acil=parcalar.filter(function(p){return mevcut(p.kod)<=0;});
  var kritikDusuk=parcalar.filter(function(p){var m=mevcut(p.kod);return m>0&&m<=(p.min_stok||1);});
  var acilHtml='';
  if(acil.length||kritikDusuk.length){
    var toplamUyari=acil.length+kritikDusuk.length;
    // Compact uyarı bandı — tıklayınca toggle
    acilHtml+='<div style="margin-bottom:16px">';
    acilHtml+='<div onclick="toggleAcil()" '
      +'style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:10px;cursor:pointer;user-select:none">'
      +'<div style="display:flex;align-items:center;gap:12px">'
      +(acil.length?'<span style="background:var(--red);color:#fff;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:600">'+acil.length+' STOK YOK</span>':'')
      +(kritikDusuk.length?'<span style="background:var(--gold);color:#000;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:600">'+kritikDusuk.length+' KRİTİK</span>':'')
      +'<span style="color:var(--text2);font-size:12px">Acil sipariş gerektiren '+toplamUyari+' parça</span>'
      +'</div>'
      +'<span style="color:var(--text3);font-size:11px">▼ detay</span>'
      +'</div>';
    // Detay — başta gizli
    acilHtml+='<div id="acil-detay" style="display:none;margin-top:6px;border:1px solid var(--border);border-radius:10px;overflow:hidden">';
    acil.forEach(function(p){
      var tes=p.teslimat?p.teslimat+' gün':'?';
      var abcK=abc(p.birim_fiyat,p.kod);
      var abcRenk=abcK==='A'?'#dc2626':abcK==='B'?'#d97706':'#64748b';
      var aktifSip=siparisler.find(function(s){return s.par_kod===p.kod&&(s.durum==='Beklemede'||s.durum==='Kargoda');});
      acilHtml+='<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);gap:12px">'
        +'<div style="display:flex;align-items:center;gap:12px;min-width:0">'
        +'<div style="width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0"></div>'
        +'<div style="min-width:0">'
        +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
        +'<span style="color:var(--blue);font-weight:600;font-size:13px;font-family:DM Mono,monospace">'+p.kod+'</span>'
        +'<span style="color:var(--text);font-size:13px">'+p.ad+'</span>'
        +'<span style="background:var(--bg3);color:var(--text3);padding:1px 7px;border-radius:4px;font-size:10px">'+( p.ekipman||'-')+'</span>'
        +'<span style="color:'+abcRenk+';font-size:10px;font-weight:600;border:1px solid '+abcRenk+';padding:1px 6px;border-radius:4px">'+abcK+'</span>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:16px;margin-top:4px">'
        +'<span style="font-size:11px;color:var(--text3)">⏱ Temin: <b style="color:var(--text2)">'+tes+'</b></span>'
        +'<span style="font-size:11px;color:var(--text3)">💰 <b style="color:var(--text2)">'+eur(p.birim_fiyat)+'</b></span>'
        +'<span style="font-size:11px;color:var(--text3)">Tedarikçi: <b style="color:var(--text2)">'+(p.tedarikci||'-')+'</b></span>'
        +'</div>'
        +'</div></div>'
        +'<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">'
        +'<span style="background:#fef2f2;color:#dc2626;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid #fca5a5">STOK YOK</span>'
        +(aktifSip
          ?'<span style="display:flex;align-items:center;gap:5px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500">'
           +'<span style="width:7px;height:7px;border-radius:50%;background:#3b82f6;animation:pulse 1.5s infinite"></span>'
           +aktifSip.durum+' — '+aktifSip.sip_no+'</span>'
          :'<button onclick="sipVerKod(this)" data-kod="'+p.kod+'" style="padding:5px 12px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;font-family:DM Sans,sans-serif">Sipariş Ver</button>')
        +'</div></div>';
    });
    kritikDusuk.forEach(function(p){
      var m=mevcut(p.kod);
      var oran=Math.round(m/(p.min_stok||1)*100);
      var tes=p.teslimat?p.teslimat+' gün':'?';
      var abcK=abc(p.birim_fiyat,p.kod);
      var abcRenk=abcK==='A'?'#dc2626':abcK==='B'?'#d97706':'#64748b';
      var aktifSip=siparisler.find(function(s){return s.par_kod===p.kod&&(s.durum==='Beklemede'||s.durum==='Kargoda');});
      var aktifSip=siparisler.find(function(s){return s.par_kod===p.kod&&(s.durum==='Beklemede'||s.durum==='Kargoda');});
      acilHtml+='<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);gap:12px">'
        +'<div style="display:flex;align-items:center;gap:12px;min-width:0">'
        +'<div style="width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0"></div>'
        +'<div style="min-width:0">'
        +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
        +'<span style="color:var(--blue);font-weight:600;font-size:13px;font-family:DM Mono,monospace">'+p.kod+'</span>'
        +'<span style="color:var(--text);font-size:13px">'+p.ad+'</span>'
        +'<span style="background:var(--bg3);color:var(--text3);padding:1px 7px;border-radius:4px;font-size:10px">'+(p.ekipman||'-')+'</span>'
        +'<span style="color:'+abcRenk+';font-size:10px;font-weight:600;border:1px solid '+abcRenk+';padding:1px 6px;border-radius:4px">'+abcK+'</span>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:16px;margin-top:4px">'
        +'<span style="font-size:11px;color:var(--text3)">📦 Stok: <b style="color:'+(m<=0?'var(--red)':'var(--gold)')+'">'+m+' / '+(p.min_stok||1)+'</b></span>'
        +'<span style="font-size:11px;color:var(--text3)">⏱ Temin: <b style="color:var(--text2)">'+tes+'</b></span>'
        +'<span style="font-size:11px;color:var(--text3)">💰 <b style="color:var(--text2)">'+eur(p.birim_fiyat)+'</b></span>'
        +'<span style="font-size:11px;color:var(--text3)">Tedarikçi: <b style="color:var(--text2)">'+(p.tedarikci||'-')+'</b></span>'
        +'</div>'
        +'</div></div>'
        +'<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">'
        +'<div style="text-align:right">'
        +'<div style="font-size:10px;color:var(--text3);margin-bottom:3px">'+oran+'% doluluk</div>'
        +'<div style="width:80px;height:5px;background:var(--border);border-radius:3px"><div style="height:5px;width:'+Math.min(100,oran)+'%;background:var(--gold);border-radius:3px"></div></div>'
        +'</div>'
        +'<span style="background:#fffbeb;color:#d97706;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid #fde68a">KRİTİK</span>'
        +(aktifSip
          ?'<span style="display:flex;align-items:center;gap:5px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500">'
           +'<span style="width:7px;height:7px;border-radius:50%;background:#3b82f6;animation:pulse 1.5s infinite"></span>'
           +aktifSip.durum+' — '+aktifSip.sip_no+'</span>'
          :'<button onclick="sipVerKod(this)" data-kod="'+p.kod+'" style="padding:5px 12px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;font-family:DM Sans,sans-serif">Sipariş Ver</button>')
        +'</div></div>';
    });
    acilHtml+='</div></div>';
  }

  // ── EN ÇOK KULLANILAN 5 PARÇA ────────────────────────────────
  var kullanimMap={};
  hareketler.filter(function(h){return h.tip==='ÇIKIŞ';}).forEach(function(h){
    kullanimMap[h.par_kod]=(kullanimMap[h.par_kod]||0)+(Number(h.miktar)||0);
  });
  var topKullanim=Object.entries(kullanimMap).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var maxKullanim=topKullanim[0]?topKullanim[0][1]:1;

  // ── AYLIK ÇIKIŞ TRENDİ ───────────────────────────────────────
  var aylar=[];
  for(var ii=5;ii>=0;ii--){var d=new Date();d.setMonth(d.getMonth()-ii);aylar.push({yil:d.getFullYear(),ay:d.getMonth()+1,label:d.toLocaleString('tr-TR',{month:'short',year:'2-digit'})});}
  var aylikData=aylar.map(function(a){
    var toplam=hareketler.filter(function(h){if(h.tip!=='ÇIKIŞ'||!h.tarih)return false;var hd=new Date(h.tarih);return hd.getFullYear()===a.yil&&hd.getMonth()+1===a.ay;}).reduce(function(s,h){return s+(Number(h.miktar)||0);},0);
    return {label:a.label,toplam:toplam};
  });
  var maxAylik=Math.max.apply(null,aylikData.map(function(x){return x.toplam;}))||1;

  var extraHtml='<div class="grid-2" style="margin-bottom:16px">';
  extraHtml+='<div class="card"><div class="section-title">En Çok Kullanılan 5 Parça</div>';
  if(topKullanim.length){
    topKullanim.forEach(function(x){
      var p=parcalar.find(function(pp){return pp.kod===x[0];})||{};
      var pct=Math.round(x[1]/maxKullanim*100);
      extraHtml+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:var(--text2)"><b style="color:var(--accent)">'+x[0]+'</b> '+(p.ad||'').slice(0,22)+'</span><span style="font-size:11px;color:var(--text3)">'+x[1]+' adet</span></div><div style="height:6px;background:var(--bg3);border-radius:3px"><div style="height:6px;width:'+pct+'%;background:var(--accent);border-radius:3px"></div></div></div>';
    });
  }else{extraHtml+='<div class="empty">Henüz çıkış yok</div>';}
  extraHtml+='</div>';

  extraHtml+='<div class="card"><div class="section-title">Aylık Stok Kullanımı (Son 6 Ay)</div>';
  aylikData.forEach(function(a){
    var pct=Math.round(a.toplam/maxAylik*100);
    extraHtml+='<div class="chart-bar-row"><div class="chart-bar-label">'+a.label+'</div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:var(--green)"></div></div><div class="chart-bar-val">'+a.toplam+' adet</div></div>';
  });
  extraHtml+='</div></div>';

  var mevcutIcerik = document.getElementById('content').innerHTML;
  document.getElementById('content').innerHTML = acilHtml + mevcutIcerik + extraHtml;

}
function renderStok(){
  document.getElementById('topbar-actions').innerHTML=`
    <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-bar" placeholder="Parça ara..." value="${stokSearch}" oninput="stokSearch=this.value;renderStok()"></div>
    <select style="padding:7px 10px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer" onchange="stokFiltre=this.value;renderStok()">
      <option value="tumu" ${stokFiltre==='tumu'?'selected':''}>Tüm Parçalar</option>
      <option value="kritik" ${stokFiltre==='kritik'?'selected':''}>Kritik / Tükenen</option>
      <option value="A" ${stokFiltre==='A'?'selected':''}>ABC — A Sınıfı</option>
      <option value="B" ${stokFiltre==='B'?'selected':''}>ABC — B Sınıfı</option>
      <option value="C" ${stokFiltre==='C'?'selected':''}>ABC — C Sınıfı</option>
    </select>
    <button class="btn" onclick="refreshAll('stok')">↻</button>
    <button class="btn btn-primary" onclick="showParcaModal()">+ Yeni Parça</button>`;
  var f=parcalar.filter(function(p){
    var aramaOk=!stokSearch||[p.kod,p.ad,p.tedarikci||'',p.ekipman||''].some(function(v){return v.toLowerCase().includes(stokSearch.toLowerCase());});
    var filtreOk=true;
    if(stokFiltre==='kritik'){var m=mevcut(p.kod);filtreOk=m<=(p.min_stok||1);}
    else if(stokFiltre==='A'||stokFiltre==='B'||stokFiltre==='C'){filtreOk=abc(p.birim_fiyat,p.kod)===stokFiltre;}
    return aramaOk&&filtreOk;
  });
  // Sıralama
  f=f.slice().sort(function(a,b){
    var av,bv;
    if(stokSirala==='kod'){av=a.kod;bv=b.kod;}
    else if(stokSirala==='ad'){av=a.ad;bv=b.ad;}
    else if(stokSirala==='stok'){av=mevcut(a.kod);bv=mevcut(b.kod);}
    else if(stokSirala==='fiyat'){av=a.birim_fiyat;bv=b.birim_fiyat;}
    else{av=a.kod;bv=b.kod;}
    if(typeof av==='string') return stokSiralaDir*av.localeCompare(bv,'tr');
    return stokSiralaDir*(av-bv);
  });
  const rows=f.map(p=>{
    const m=mevcut(p.kod),d=durum(p),a=abc(p.birim_fiyat,p.kod),ac=a==='A'?'badge-red':a==='B'?'badge-gold':'badge-gray';
    const fotoUrl=fotografUrl(p.kod);
    return`<tr>
      <td style="width:44px;padding:6px"><img src="${fotoUrl}" style="width:36px;height:36px;object-fit:cover;border-radius:6px;border:1px solid var(--border)" onerror="this.style.opacity='0'" loading="lazy"></td>
      <td style="color:var(--accent);font-weight:600;white-space:nowrap;font-family:DM Mono,monospace">${p.kod}</td>
      <td>${p.ad}</td>
      <td style="color:var(--text3)">${p.kategori||'-'}</td>
      <td style="color:var(--text3)">${p.ekipman||'-'}</td>
      <td><b style="color:${m<=0?'var(--red)':m<=(p.min_stok||1)?'var(--gold)':'var(--green)'}">${m}</b></td>
      <td style="color:var(--text3)">${p.min_stok||0}</td>
      <td style="color:var(--gold)">${fiyatGoster(p)}</td>
      <td><span class="badge ${ac}">${a}</span></td>
      <td><span class="badge ${d.c}">${d.l}</span></td>
      <td style="color:var(--text3)">${p.tedarikci||'-'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm" onclick="showParcaModal('${p.id}')">Düzenle</button>
        <button class="btn btn-sm" onclick="showHareketModal('${p.kod}')">Hareket</button>
        <button class="btn btn-sm btn-danger" onclick="parcaSil('${p.id}','${p.kod}')">Sil</button>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('content').innerHTML=`<div class="card" style="padding:0;overflow:hidden"><div class="table-wrap"><table><thead><tr><th>Resim</th><th onclick="stokSirala='kod';stokSiralaDir*=-1;renderStok()" style="cursor:pointer;user-select:none;min-width:90px">Kod</th><th onclick="stokSirala='ad';stokSiralaDir*=-1;renderStok()" style="cursor:pointer;user-select:none">Parça Adı</th><th>Kategori</th><th>Ekipman</th><th onclick="stokSirala='stok';stokSiralaDir*=-1;renderStok()" style="cursor:pointer;user-select:none">Stok</th><th>Min</th><th onclick="stokSirala='fiyat';stokSiralaDir*=-1;renderStok()" style="cursor:pointer;user-select:none">Fiyat</th><th>ABC</th><th>Durum</th><th>Tedarikçi</th><th>İşlem</th></tr></thead><tbody>${rows||'<tr><td colspan="11"><div class="empty">Henüz parça eklenmedi</div></td></tr>'}</tbody></table></div></div>`;
}

async function saveParca(id){
  const g=x=>document.getElementById(x);
  const k=g('f-kod').value.trim().toUpperCase(),ad=g('f-ad').value.trim();
  if(!k||!ad){alert('Parça kodu ve adı zorunludur!');return;}
  const fg=parseFloat(g('f-fiyat').value)||0,pb=g('f-pb').value;
  const obj={kod:k,ad,kategori:g('f-kat').value,ekipman:g('f-ekp').value,birim_fiyat:fg*(DKUR[pb]||1),birim_fiyat_giris:fg,pb,birim:g('f-birim').value||'Adet',min_stok:parseInt(g('f-min').value)||0,baslangic:parseInt(g('f-bas').value)||0,tedarikci:g('f-ted').value,teslimat:parseInt(g('f-tes').value)||0,notlar:g('f-not').value};
  try{
    if(id) await sbUpdate('parcalar',id,obj);
    else await sbInsert('parcalar',obj);
    // Fotoğraf varsa yükle
    var fotoInput = document.getElementById('f-foto');
    if(fotoInput && fotoInput.files && fotoInput.files[0]){
      await fotografYukle(fotoInput.files[0], obj.kod);
    }
    closeModal();
    await refreshAll('stok');
  }catch(e){alert('Hata: '+e.message);}
}

async function parcaSil(id,kod){
  var harSay=hareketler.filter(h=>h.par_kod===kod).length;
  var sipSay=siparisler.filter(s=>s.par_kod===kod).length;
  var uyari='"'+kod+'" kodlu parçayı silmek istediğinize emin misiniz?';
  if(harSay>0||sipSay>0) uyari+='\n\n⚠ Bu parçaya ait '+harSay+' hareket ve '+sipSay+' sipariş kaydı da silinecek!';
  if(!confirm(uyari))return;
  await sbDelete('parcalar',id);
  await refreshAll('stok');
}

function renderEOQ(){
  document.getElementById('topbar-actions').innerHTML=`<button class="btn" onclick="refreshAll('eoq')">↻ Yenile</button>`;
  const rows=parcalar.map(p=>{
    const t=p.yillik_talep||1,sm=p.siparis_maliyet||50,I=p.birim_fiyat*0.25;
    const eoq=I>0?Math.max(1,Math.round(Math.sqrt(2*t*sm/I))):1;
    const ss=Math.max(1,Math.round(1.65*0.05*Math.sqrt(p.teslimat||14)));
    const rop=Math.max(1,Math.round((t/365)*(p.teslimat||14)+ss));
    const topM=sm*(t/eoq)+I*(eoq/2);
    return`<tr><td style="color:var(--accent);font-weight:600;white-space:nowrap;font-family:DM Mono,monospace">${p.kod}</td><td>${p.ad.length>28?p.ad.slice(0,28)+'…':p.ad}</td><td style="color:var(--gold)">${eur(p.birim_fiyat)}</td><td><input type="number" value="${t}" min="0.1" step="0.5" style="width:65px;background:var(--bg);border:1px solid var(--green);color:var(--green);padding:4px 6px;border-radius:6px;font-size:11px;font-weight:600" onchange="updateEOQ('${p.id}','yillik_talep',this.value)"></td><td><input type="number" value="${sm}" min="1" style="width:65px;background:var(--bg);border:1px solid var(--green);color:var(--green);padding:4px 6px;border-radius:6px;font-size:11px;font-weight:600" onchange="updateEOQ('${p.id}','siparis_maliyet',this.value)"></td><td style="color:var(--text3)">${p.teslimat||14}</td><td><b style="color:var(--accent)">${eoq}</b></td><td style="color:var(--gold)">${ss}</td><td><b style="color:var(--gold)">${rop}</b></td><td style="color:var(--text3)">${(t/eoq).toFixed(1)}x/yıl</td><td style="color:var(--green)">${eur(topM)}</td></tr>`;
  }).join('');
  document.getElementById('content').innerHTML=`<div class="alert alert-info"><span class="alert-icon">ℹ</span>Yeşil hücreler düzenlenebilir — değiştirince otomatik kaydedilir.</div><div class="card" style="padding:0;overflow:hidden"><div class="table-wrap"><table><thead><tr><th>Kod</th><th>Parça Adı</th><th>Birim Fiyat</th><th style="color:var(--green)">Yıllık Talep</th><th style="color:var(--green)">Sipariş Maliyet (€)</th><th>Temin (gün)</th><th>EOQ</th><th>Güv.Stok</th><th>ROP</th><th>Sipariş/Yıl</th><th>Yıllık Maliyet</th></tr></thead><tbody>${rows||'<tr><td colspan="11"><div class="empty">Önce parça ekleyin</div></td></tr>'}</tbody></table></div></div>`;
}

  const pk=document.getElementById('h-par').value,mik=parseInt(document.getElementById('h-mik').value)||1;
  if(!pk){alert('Parça seçin!');return;}
  try{await sbInsert('hareketler',{par_kod:pk,tip:document.getElementById('h-tip').value,miktar:mik,tarih:document.getElementById('h-tar').value||null,kullanan:document.getElementById('h-kul').value,i_emri:document.getElementById('h-ie').value,aciklama:document.getElementById('h-ac').value});closeModal();await refreshAll('hareket');}catch(e){alert('Hata: '+e.message);}
}

async function harSil(id){if(!confirm('Hareketi silmek istediğinize emin misiniz?'))return;await sbDelete('hareketler',id);await refreshAll('hareket');}

function renderRaporlar(){
  document.getElementById('topbar-actions').innerHTML=
    '<button class="btn" onclick="refreshAll(\'raporlar\')">↻ Yenile</button>'
    +'<button class="btn btn-primary" onclick="excelIndir()">⬇ Excel İndir</button>';

  // Hesaplamalar
  var toplamDeger=parcalar.reduce(function(s,p){return s+mevcut(p.kod)*p.birim_fiyat;},0);
  var toplamCikis=hareketler.filter(function(h){return h.tip==='ÇIKIŞ';}).reduce(function(s,h){return s+(Number(h.miktar)||0);},0);
  var toplamSip=siparisler.reduce(function(s,x){return s+(x.tutar||0);},0);
  var tamSip=siparisler.filter(function(s){return s.durum==='Tamamlandı';}).length;

  // Aylık çıkış (son 6 ay)
  var aylar=[];
  for(var i=5;i>=0;i--){var d=new Date();d.setMonth(d.getMonth()-i);aylar.push({yil:d.getFullYear(),ay:d.getMonth()+1,label:d.toLocaleString('tr-TR',{month:'short'})});}
  var aylikCikis=aylar.map(function(a){
    return hareketler.filter(function(h){
      if(h.tip!=='ÇIKIŞ'||!h.tarih) return false;
      var hd=new Date(h.tarih);
      return hd.getFullYear()===a.yil&&hd.getMonth()+1===a.ay;
    }).reduce(function(s,h){return s+(Number(h.miktar)||0);},0);
  });
  var aylikGiris=aylar.map(function(a){
    return hareketler.filter(function(h){
      if(h.tip!=='GİRİŞ'||!h.tarih) return false;
      var hd=new Date(h.tarih);
      return hd.getFullYear()===a.yil&&hd.getMonth()+1===a.ay;
    }).reduce(function(s,h){return s+(Number(h.miktar)||0);},0);
  });

  // ABC dağılımı
  var abcSay={A:0,B:0,C:0};
  var abcDeger={A:0,B:0,C:0};
  parcalar.forEach(function(p){
    var k=abc(p.birim_fiyat,p.kod);
    abcSay[k]++;
    abcDeger[k]+=mevcut(p.kod)*p.birim_fiyat;
  });

  // Tedarikçi bazlı stok değeri (top 5)
  var tedDeger={};
  parcalar.forEach(function(p){
    var t=p.tedarikci||'Belirtilmemiş';
    tedDeger[t]=(tedDeger[t]||0)+mevcut(p.kod)*p.birim_fiyat;
  });
  var tedList=Object.entries(tedDeger).sort(function(a,b){return b[1]-a[1];}).slice(0,5);

  document.getElementById('content').innerHTML=`
<div class="grid-4" style="margin-bottom:20px">
  <div class="kpi"><div class="kpi-icon blue">📦</div><div class="kpi-label">Toplam Stok Değeri</div><div class="kpi-value" style="color:var(--blue)">${eur(toplamDeger)}</div></div>
  <div class="kpi"><div class="kpi-icon red">📤</div><div class="kpi-label">Toplam Çıkış</div><div class="kpi-value" style="color:var(--red)">${toplamCikis} adet</div></div>
  <div class="kpi"><div class="kpi-icon gold">🛒</div><div class="kpi-label">Toplam Sipariş</div><div class="kpi-value" style="color:var(--gold)">${eur(toplamSip)}</div></div>
  <div class="kpi"><div class="kpi-icon green">✅</div><div class="kpi-label">Tamamlanan Sipariş</div><div class="kpi-value" style="color:var(--green)">${tamSip}</div></div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="section-title">Aylık Stok Hareketi (Son 6 Ay)</div>
    <div style="position:relative;height:220px">
      <canvas id="chart-aylik"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="section-title">ABC Sınıfı Dağılımı</div>
    <div style="position:relative;height:220px;display:flex;align-items:center;justify-content:center">
      <canvas id="chart-abc" style="max-width:220px;max-height:220px"></canvas>
    </div>
  </div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="section-title">Tedarikçi Bazlı Stok Değeri (Top 5)</div>
    <div style="position:relative;height:200px">
      <canvas id="chart-ted"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="section-title">Sipariş Durumu Dağılımı</div>
    <div style="position:relative;height:200px;display:flex;align-items:center;justify-content:center">
      <canvas id="chart-sip" style="max-width:200px;max-height:200px"></canvas>
    </div>
  </div>
</div>`;

  // Chart.js yükle ve çiz
  if(typeof Chart==='undefined'){
    var sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
    sc.onload=function(){cizGrafikleri(aylar,aylikCikis,aylikGiris,abcSay,abcDeger,tedList);};
    document.head.appendChild(sc);
  } else {
    cizGrafikleri(aylar,aylikCikis,aylikGiris,abcSay,abcDeger,tedList);
  }
}

function cizGrafikleri(aylar,aylikCikis,aylikGiris,abcSay,abcDeger,tedList){
  Chart.defaults.font.family="'DM Sans',sans-serif";
  Chart.defaults.font.size=11;
  Chart.defaults.color='#94a3b8';

  // 1. Aylık hareket — çubuk grafik
  var ctx1=document.getElementById('chart-aylik');
  if(ctx1){
    new Chart(ctx1,{
      type:'bar',
      data:{
        labels:aylar.map(function(a){return a.label;}),
        datasets:[
          {label:'Çıkış',data:aylikCikis,backgroundColor:'rgba(239,68,68,0.7)',borderRadius:4},
          {label:'Giriş',data:aylikGiris,backgroundColor:'rgba(16,185,129,0.7)',borderRadius:4}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'top',labels:{boxWidth:10,padding:16}}},
        scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{stepSize:1}}}
      }
    });
  }

  // 2. ABC dağılımı — donut
  var ctx2=document.getElementById('chart-abc');
  if(ctx2){
    new Chart(ctx2,{
      type:'doughnut',
      data:{
        labels:['Sınıf A','Sınıf B','Sınıf C'],
        datasets:[{
          data:[abcSay.A,abcSay.B,abcSay.C],
          backgroundColor:['#ef4444','#f59e0b','#94a3b8'],
          borderWidth:0,hoverOffset:4
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,cutout:'65%',
        plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:14}}}
      }
    });
  }

  // 3. Tedarikçi — yatay çubuk
  var ctx3=document.getElementById('chart-ted');
  if(ctx3&&tedList.length){
    new Chart(ctx3,{
      type:'bar',
      data:{
        labels:tedList.map(function(x){return x[0].length>15?x[0].slice(0,15)+'…':x[0];}),
        datasets:[{
          label:'Stok Değeri (€)',
          data:tedList.map(function(x){return Number(x[1].toFixed(2));}),
          backgroundColor:'rgba(59,130,246,0.7)',borderRadius:4
        }]
      },
      options:{
        indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{callback:function(v){return '€'+v.toLocaleString('tr-TR');}}},y:{grid:{display:false}}}
      }
    });
  }

  // 4. Sipariş durumu — donut
  var ctx4=document.getElementById('chart-sip');
  if(ctx4){
    var sipDurum={Beklemede:0,Kargoda:0,'Tamamlandı':0,'İptal':0};
    siparisler.forEach(function(s){if(sipDurum[s.durum]!==undefined)sipDurum[s.durum]++;});
    new Chart(ctx4,{
      type:'doughnut',
      data:{
        labels:Object.keys(sipDurum),
        datasets:[{
          data:Object.values(sipDurum),
          backgroundColor:['#f59e0b','#3b82f6','#10b981','#94a3b8'],
          borderWidth:0,hoverOffset:4
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,cutout:'65%',
        plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:14}}}
      }
    });
  }
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}

(async()=>{await loadAll();updateBadge();navigate('dashboard');})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
function excelIndir(){
  // SheetJS ile Excel oluştur
  if(typeof XLSX === 'undefined'){
    alert('Excel kütüphanesi yükleniyor, lütfen bekleyin...');
    return;
  }
  var wb = XLSX.utils.book_new();

  // 1. Stok Verileri sayfası
  var stokData = [['Parça Kodu','Parça Adı','Kategori','Ekipman','Mevcut Stok','Min Stok','Birim Fiyat (€)','Toplam Değer (€)','ABC','Tedarikçi','Teslimat (gün)','Kritik']];
  parcalar.forEach(function(p){
    var m=mevcut(p.kod);
    stokData.push([p.kod,p.ad,p.kategori||'',p.ekipman||'',m,p.min_stok||0,Number(p.birim_fiyat||0).toFixed(2),Number(m*p.birim_fiyat).toFixed(2),abc(p.birim_fiyat,p.kod),p.tedarikci||'',p.teslimat||0,p.kritik?'Evet':'Hayır']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(stokData), 'Stok Verileri');

  // 2. Kritik Parçalar sayfası
  var kritikData = [['Parça Kodu','Parça Adı','Ekipman','Stok','Min Stok','ROP','Birim Fiyat (€)','ABC','Tedarikçi','Teslimat (gün)','Neden Kritik','Durum']];
  parcalar.forEach(function(p){
    var m=mevcut(p.kod);
    var talep=p.yillik_talep||1, teslimat=p.teslimat||0;
    var ss=Math.max(1,Math.round(2.33*0.20*Math.sqrt(teslimat||14)));
    var rop=Math.max(1,Math.round((talep/365)*teslimat+ss));
    var abcS=abc(p.birim_fiyat,p.kod);
    var nedenler=[];
    if(p.kritik) nedenler.push('Manuel');
    if(m<=0) nedenler.push('Tükendi');
    else if(m<=(p.min_stok||1)) nedenler.push('Min Stok Altı');
    if(teslimat>0&&m<=rop&&m>(p.min_stok||1)) nedenler.push('ROP Altı');
    if(teslimat>=30&&m<=ss&&m>(p.min_stok||1)) nedenler.push('Uzun Temin');
    if(abcS==='A'&&m<=(p.min_stok||1)*2&&m>(p.min_stok||1)) nedenler.push('A Sınıfı Düşük');
    if(nedenler.length===0) return;
    var durum=m<=0?'ACİL SİPARİŞ':m<=(p.min_stok||1)?'KRİTİK':'UYARI';
    kritikData.push([p.kod,p.ad,p.ekipman||'',m,p.min_stok||0,rop,Number(p.birim_fiyat||0).toFixed(2),abcS,p.tedarikci||'',teslimat,nedenler.join(', '),durum]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(kritikData), 'Kritik Parçalar');

  // 3. Sipariş Takip sayfası
  var sipData = [['Sipariş No','Parça Kodu','Parça Adı','Tedarikçi','Miktar','Tutar (€)','Sipariş Tarihi','Tahmini Teslimat','Durum']];
  siparisler.forEach(function(s){
    var p=parcalar.find(function(x){return x.kod===s.par_kod;})||{};
    sipData.push([s.sip_no,s.par_kod,p.ad||s.par_ad||'',p.tedarikci||'',s.miktar,Number(s.tutar||0).toFixed(2),s.sip_tarih||'',s.tes_tarih||'',s.durum]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sipData), 'Sipariş Takip');

  // 4. Hareket Log sayfası
  var harData = [['Tarih','Parça Kodu','Parça Adı','Kullanan','Hareket Tipi','Miktar','İş Emri','Açıklama']];
  hareketler.forEach(function(h){
    var p=parcalar.find(function(x){return x.kod===h.par_kod;})||{};
    harData.push([h.tarih||'',h.par_kod,p.ad||'',h.kullanan||'',h.tip,h.miktar,h.i_emri||'',h.aciklama||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(harData), 'Hareket Log');

  // Dosyayı indir
  var tarih = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, 'StokTakip_Rapor_'+tarih+'.xlsx');
}
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StokTakip — Yedek Parça Yönetim Sistemi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb-bg:#0f1623;
  --sb-hover:#1a2332;
  --sb-active:#1e3a5f;
  --sb-border:#1e2d42;
  --sb-text:#64748b;
  --sb-text-active:#60a5fa;
  --sb-accent:#3b82f6;

  --bg:#f0f4f8;
  --bg2:#ffffff;
  --bg3:#f8fafc;
  --border:#e2e8f0;
  --border2:#cbd5e1;
  --text:#0f172a;
  --text2:#334155;
  --text3:#94a3b8;

  --blue:#3b82f6;
  --blue-dark:#2563eb;
  --blue-light:#eff6ff;
  --blue-mid:#bfdbfe;
  --green:#10b981;
  --green-light:#f0fdf4;
  --red:#ef4444;
  --red-light:#fef2f2;
  --gold:#f59e0b;
  --gold-light:#fffbeb;
  --purple:#8b5cf6;

  --r-sm:6px;
  --r:10px;
  --r-lg:14px;
  --r-xl:18px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 10px 30px rgba(0,0,0,.1),0 4px 8px rgba(0,0,0,.06);
}

body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── LAYOUT ─────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ─────────────────────────── */
.sidebar{width:240px;background:var(--sb-bg);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--sb-border)}
.logo{padding:22px 20px 18px;border-bottom:1px solid var(--sb-border);display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.logo-title{font-size:15px;font-weight:700;color:#f1f5f9;letter-spacing:-.02em}
.logo-sub{font-size:10px;color:#475569;margin-top:1px;font-weight:400}

.nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:#334155;text-transform:uppercase;letter-spacing:.1em;padding:14px 12px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--r-sm);cursor:pointer;color:var(--sb-text);font-size:12px;font-weight:400;transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;position:relative}
.nav-item:hover{background:var(--sb-hover);color:#94a3b8}
.nav-item.active{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(59,130,246,.08));color:var(--sb-text-active);font-weight:500}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--sb-accent);border-radius:0 3px 3px 0}
.nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;opacity:.7;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}.nav-icon svg{stroke:currentColor}
.nav-badge{margin-left:auto;background:#ef4444;color:#fff;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700;min-width:18px;text-align:center}

.conn-status{padding:10px 16px;border-top:1px solid var(--sb-border);font-size:11px;display:flex;align-items:center;gap:7px;color:#475569}
.conn-dot{width:6px;height:6px;border-radius:50%;background:#374151;flex-shrink:0;transition:background .3s}
.conn-dot.ok{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.4)}
.conn-dot.err{background:#ef4444}

/* ── MAIN ─────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:0 24px;height:58px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);box-shadow:var(--shadow-sm);flex-shrink:0;gap:16px;overflow:hidden}
.page-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.02em;white-space:nowrap;flex-shrink:0}
.topbar-actions{display:flex;gap:6px;align-items:center;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;flex-shrink:1;min-width:0;scrollbar-width:none}.topbar-actions::-webkit-scrollbar{display:none}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── BUTTONS ─────────────────────────── */
.btn{padding:7px 14px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;line-height:1.4}
.btn:hover{background:var(--bg3);border-color:var(--border2);color:var(--text);box-shadow:var(--shadow-sm)}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}
.btn-primary:hover{background:var(--blue-dark);border-color:var(--blue-dark);box-shadow:0 4px 12px rgba(59,130,246,.3)}
.btn-danger{border-color:#fca5a5;color:var(--red);background:var(--red-light)}
.btn-danger:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text3)}
.btn-ghost:hover{background:var(--bg3);color:var(--text2);border-color:transparent}

/* ── CARDS ───────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow)}
.card:hover{box-shadow:var(--shadow-md)}

/* ── KPI CARDS ───────────────────────── */
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow);transition:all .2s;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 var(--r-lg) 0 60px;opacity:.04}
.kpi:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.kpi-icon{width:38px;height:38px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:14px}
.kpi-icon.blue{background:var(--blue-light)}
.kpi-icon.green{background:var(--green-light)}
.kpi-icon.red{background:var(--red-light)}
.kpi-icon.gold{background:var(--gold-light)}
.kpi-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:700;letter-spacing:-.03em;line-height:1.1}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:4px}

/* ── GRIDS ───────────────────────────── */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}

/* ── SECTION TITLE ───────────────────── */
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}

/* ── TABLE ───────────────────────────── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.table-wrap::-webkit-scrollbar{height:6px;width:6px}
.table-wrap::-webkit-scrollbar-track{background:var(--bg3)}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:10}
th{text-align:left;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.02em;padding:9px 12px;border-bottom:2px solid var(--border);white-space:nowrap;background:var(--bg3)}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
tbody tr{transition:background .1s}
tbody tr:hover td{background:#f8fafc}
tbody tr:nth-child(even) td{background:#fafbfc}
tbody tr:nth-child(even):hover td{background:#f1f5f9}
tr:last-child td{border-bottom:none}

/* ── BADGES ──────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;letter-spacing:.01em}
.badge-red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.badge-green{background:#f0fdf4;color:#059669;border:1px solid #a7f3d0}
.badge-gold{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.badge-blue{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.badge-gray{background:#f8fafc;color:#64748b;border:1px solid #e2e8f0}
.badge-purple{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}

/* ── PROGRESS ─────────────────────────── */
.progress-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* ── CHART BARS ──────────────────────── */
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.chart-bar-label{font-size:11px;color:var(--text2);width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar-track{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.chart-bar-val{font-size:11px;color:var(--text3);width:65px;text-align:right;flex-shrink:0;font-family:'JetBrains Mono',monospace}

/* ── FORMS ───────────────────────────── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.01em}
.form-group input,.form-group select,.form-group textarea{background:var(--bg3);border:1.5px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--r-sm);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:all .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);background:var(--bg2);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.form-group select{cursor:pointer;appearance:auto}

/* ── SEARCH ──────────────────────────── */
.search-wrap{position:relative;display:inline-flex;align-items:center}
.search-icon{position:absolute;left:10px;color:var(--text3);font-size:12px;pointer-events:none}
.search-bar{background:var(--bg3);border:1.5px solid var(--border);color:var(--text);padding:7px 12px 7px 30px;border-radius:var(--r-sm);font-size:12px;font-family:'Inter',sans-serif;outline:none;width:210px;transition:all .15s}
.search-bar:focus{border-color:var(--blue);background:var(--bg2);box-shadow:0 0 0 3px rgba(59,130,246,.1);width:240px}

/* ── MODAL ───────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s ease}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-xl);padding:28px;width:600px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .2s cubic-bezier(.34,1.56,.64,1)}
.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border);letter-spacing:-.02em}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}

/* ── ALERTS ──────────────────────────── */
.alert{padding:12px 16px;border-radius:var(--r-sm);font-size:12px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;line-height:1.5}
.alert-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.alert-warning{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.alert-danger{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b}
.alert-success{background:#f0fdf4;border:1px solid #a7f3d0;color:#065f46}
.alert-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}

/* ── MISC ────────────────────────────── */
.empty{text-align:center;padding:56px 24px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.loading{text-align:center;padding:56px;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:12px}
.spinner{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.mono{font-family:'JetBrains Mono',monospace}
.divider{height:1px;background:var(--border);margin:16px 0}

/* ── ANIMATIONS ──────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pulse2{0%,100%{opacity:.3}50%{opacity:.8}}

/* ── LOGIN ───────────────────────────── */
#LO{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;overflow:hidden}
#LO-bg{position:absolute;inset:0;background:#070e1a}
#LO-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 15% 50%,rgba(30,58,138,.5) 0%,transparent 55%)}
#LO-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 70% at 85% 30%,rgba(6,78,59,.25) 0%,transparent 50%)}
.login-wrap{display:flex;width:880px;max-width:96vw;height:500px;max-height:96vh;border-radius:var(--r-xl);overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.7);position:relative;z-index:1;border:1px solid rgba(255,255,255,.05)}
.login-left{flex:1;background:linear-gradient(145deg,#0d2040 0%,#091529 100%);padding:44px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.login-brand{position:relative;z-index:1}
.login-brand-icon{width:56px;height:56px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:18px;box-shadow:0 8px 24px rgba(59,130,246,.35)}
.login-brand-name{font-size:24px;font-weight:700;color:#f1f5f9;letter-spacing:-.03em}
.login-brand-sub{font-size:12px;color:#94a3b8;margin-top:8px;line-height:1.6}
.login-right{width:360px;background:#ffffff;padding:44px;display:flex;flex-direction:column;justify-content:center}
.login-right-title{font-size:20px;font-weight:700;color:#0f172a;margin-bottom:4px;letter-spacing:-.03em}
.login-right-sub{font-size:12px;color:#94a3b8;margin-bottom:28px}
.login-field{margin-bottom:18px}
.login-field label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:7px;text-transform:uppercase;letter-spacing:.07em}
.login-field input{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;color:#0f172a;padding:11px 14px;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:all .15s}
.login-field input:focus{border-color:#3b82f6;background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.login-btn{width:100%;padding:12px;border-radius:8px;border:none;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;letter-spacing:.01em}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(59,130,246,.4)}
.login-btn:active{transform:translateY(0)}
.login-err{background:#fef2f2;border:1.5px solid #fca5a5;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:16px;display:none;text-align:center;font-weight:500}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:40px}
.pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;font-size:15px;padding:0;line-height:1;transition:color .15s}
.pass-eye:hover{color:#475569}

/* ── SCROLLBAR ───────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ── MOBILE ──────────────────────────── */
@media(max-width:768px){
  .app{flex-direction:column;height:auto;min-height:100vh}
  .sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--sb-border)}
  .logo{padding:12px 16px}
  .logo-sub{display:none}
  .nav{display:flex;flex-direction:row;padding:6px 8px;gap:2px;overflow-x:auto}
  .nav-section{display:none}
  .nav-item{flex-direction:column;padding:7px 10px;font-size:9px;gap:3px;min-width:52px;justify-content:center}
  .nav-item.active::before{display:none}
  .conn-status{display:none}
  .content{padding:16px}
  .grid-4{grid-template-columns:1fr 1fr;gap:10px}
  .grid-2{grid-template-columns:1fr}
  .modal{padding:20px}
  .form-grid{grid-template-columns:1fr}
  .search-bar{width:150px}
}
@media(max-width:480px){.grid-4{grid-template-columns:1fr}}

[data-tema="dark"]{
  --bg:#0f172a;
  --bg2:#1e293b;
  --bg3:#334155;
  --border:#334155;
  --border2:#475569;
  --text:#e2e8f0;
  --text2:#cbd5e1;
  --text3:#64748b;
  --blue-light:rgba(59,130,246,.15);
  --blue-mid:rgba(59,130,246,.3);
  --green-light:rgba(16,185,129,.1);
  --red-light:rgba(239,68,68,.1);
  --gold-light:rgba(245,158,11,.1);
}
[data-tema="dark"] tbody tr:hover td{background:#334155}
[data-tema="dark"] tbody tr:nth-child(even) td{background:#1a2740}
[data-tema="dark"] tbody tr:nth-child(even):hover td{background:#253350}
[data-tema="dark"] .login-right{background:#1e293b}
[data-tema="dark"] .login-right-title{color:#e2e8f0}
[data-tema="dark"] .login-field input{background:#0f172a;border-color:#334155;color:#e2e8f0}


.notif-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg2)}
#notif-panel{position:fixed;top:58px;right:16px;width:340px;max-height:480px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);z-index:500;overflow:hidden;display:none;flex-direction:column}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;transition:background .1s}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{background:var(--blue-light)}
.notif-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}


/* ── SAYFA GEÇİŞ ANİMASYONU ─────────────────────────────── */
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes countUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.page-enter{animation:pageIn .25s cubic-bezier(.4,0,.2,1)}
.card-enter{animation:cardIn .3s cubic-bezier(.34,1.56,.64,1) both}

/* Skeleton loader */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}

/* KPI animasyonu */
.kpi-value{transition:all .3s ease}

/* Tablo satır animasyonu */
tbody tr{animation:pageIn .2s ease both}

<script>
async function LF(){
  var u=document.getElementById('LU').value;
  var p=document.getElementById('LP').value;
  async function sha256(s){var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
  var uh=await sha256(u), ph=await sha256(p);
  if(uh==='5dedffe32144e8b2968f1c69a0b8f909e463a089a8cfac3ce72123120c56cb79'&&ph==='79282175708d38707c95940fc655a437a78d2def8fa9a4b397a9937706414779'){
    document.getElementById('LO').style.display='none';
    sessionStorage.setItem('auth','1');
    // QR'dan gelindi mi?
    var urlParams=new URLSearchParams(window.location.search);
    var parcaKod=urlParams.get('parca');
    if(parcaKod){
      setTimeout(function(){
        var p=parcalar.find(function(x){return x.kod===parcaKod;});
        if(p){navigate('stok');setTimeout(function(){showParcaDetay(p.id);},300);}
      },300);
    }
  }else{
    document.getElementById('LE').style.display='block';
    document.getElementById('LP').value='';
  }
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter') LF();
  if(e.key==='Escape') closeModal();
});
// Global klavye kısayolları (login sonrası)
document.addEventListener('keydown',function(e){
  if(!sessionStorage.getItem('auth')) return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  if(e.altKey){
    if(e.key==='1') navigate('dashboard');
    else if(e.key==='2') navigate('stok');
    else if(e.key==='3') navigate('kritik');
    else if(e.key==='4') navigate('eoq');
    else if(e.key==='5') navigate('siparis');
    else if(e.key==='6') navigate('hareket');
    else if(e.key==='7') navigate('raporlar');
  }
  if(e.key==='n'&&curPage==='stok') showParcaModal();
  if(e.key==='r') refreshAll(curPage);
  if(e.key==='/'&&curPage==='stok'){
    e.preventDefault();
    var sb=document.querySelector('.search-bar');
    if(sb) sb.focus();
  }
});
if(sessionStorage.getItem('auth')==='1'){document.addEventListener('DOMContentLoaded',function(){
  var lo=document.getElementById('LO');if(lo)lo.style.display='none';
  setTimeout(function(){
    var urlParams=new URLSearchParams(window.location.search);
    var parcaKod=urlParams.get('parca');
    if(parcaKod){
      var p=parcalar.find(function(x){return x.kod===parcaKod;});
      if(p){navigate('stok');setTimeout(function(){showParcaDetay(p.id);},500);}
    }
  },800);
});}
</script>

function mevcut(kod){
  const p=parcalar.find(x=>x.kod===kod);if(!p)return 0;
  let s=Number(p.baslangic)||0;
  hareketler.filter(h=>h.par_kod===kod).forEach(h=>{
    if(h.tip==='GİRİŞ')s+=Number(h.miktar)||0;
    else if(h.tip==='ÇIKIŞ')s-=Number(h.miktar)||0;
    else if(h.tip==='DÜZELTME')s=Number(h.miktar)||0;
  });
  return Math.max(0,s);
}
function abc(f,kod){
  // Birim fiyata göre sabit eşik:
  // A: ≥500€ — pahalı, kritik parçalar
  // B: 50-500€ — orta değerli
  // C: <50€ — ucuz, sarf malzeme
  var fiyat = f || 0;
  if(fiyat >= 500) return 'A';
  if(fiyat >= 50)  return 'B';
  return 'C';
}

var importData=[];
function importDosyaOku(input){
  var f=input.files[0];
  if(!f) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;
    var rows=text.split(/\r?\n/).filter(function(r){return r.trim();});
    if(rows.length<2){alert('Dosya boş veya hatalı');return;}
    var headers=rows[0].split(',').map(function(h){return h.trim().replace(/"/g,'');});
    importData=rows.slice(1).map(function(row){
      var cols=row.split(',').map(function(c){return c.trim().replace(/"/g,'');});
      var obj={};
      headers.forEach(function(h,i){obj[h]=cols[i]||'';});
      return obj;
    });
    var html='<table style="width:100%;font-size:11px"><thead><tr>'+headers.map(function(h){return'<th style="padding:6px 8px;background:var(--bg3);border-bottom:1px solid var(--border)">'+h+'</th>';}).join('')+'</tr></thead><tbody>';
    html+=importData.slice(0,5).map(function(row){return'<tr>'+headers.map(function(h){return'<td style="padding:5px 8px;border-bottom:1px solid var(--border)">'+( row[h]||'')+'</td>';}).join('')+'</tr>';}).join('');
    if(importData.length>5) html+='<tr><td colspan="'+headers.length+'" style="padding:6px 8px;color:var(--text3);text-align:center">... ve '+( importData.length-5)+' satır daha</td></tr>';
    html+='</tbody></table>';
    document.getElementById('import-tablo').innerHTML=html;
    document.getElementById('import-say').textContent=importData.length+' parça içe aktarılacak';
    document.getElementById('import-onizleme').style.display='block';
    document.getElementById('import-btn').style.display='';
  };
  reader.readAsText(f,'UTF-8');
}

async function importKaydet(){
  if(!importData.length) return;
  var btn=document.getElementById('import-btn');
  btn.textContent='İçe Aktarılıyor...';btn.disabled=true;
  var basarili=0,hata=0;
  for(var i=0;i<importData.length;i++){
    var d=importData[i];
    if(!d.kod||!d.ad) continue;
    try{
      var pb='EUR';
      var fiyat=parseFloat(d.birim_fiyat)||0;
      await sbInsert('parcalar',{
        kod:d.kod.trim(),ad:d.ad.trim(),kategori:d.kategori||'',ekipman:d.ekipman||'',
        birim_fiyat:fiyat*(DKUR[pb]||1),birim_fiyat_giris:fiyat,pb:pb,

        baslangic:parseInt(d.baslangic)||0,tedarikci:d.tedarikci||'',

        siparis_maliyet:parseFloat(d.siparis_maliyet)||50,notlar:d.notlar||''
      });
      basarili++;
    }catch(e){hata++;}
  }

}

function showSiparisTakvim(){

async function topluHareketKaydet(){
  var tip=document.getElementById('th-tip').value;
  var tarih=document.getElementById('th-tarih').value||new Date().toISOString().slice(0,10);
  var kullanan=document.getElementById('th-kullanan').value||'';
  var iemri=document.getElementById('th-iemri').value||'';
  var satirlar=document.querySelectorAll('.th-satir');
  if(!satirlar.length){alert('En az 1 parça ekleyin.');return;}
  var islemler=[];
  satirlar.forEach(function(s){
    var kod=s.querySelector('.th-parca').value;
    var miktar=parseInt(s.querySelector('.th-miktar').value)||1;
    if(kod && miktar>0) islemler.push({kod:kod,miktar:miktar});
  });
  if(!islemler.length) return;
  try{
    for(var i=0;i<islemler.length;i++){
      await sbInsert('hareketler',{
        par_kod:islemler[i].kod, tip:tip, miktar:islemler[i].miktar,
        tarih:tarih, kullanan:kullanan, i_emri:iemri,
        aciklama:'Toplu hareket girişi'
      });
    }
    closeModal();
    await refreshAll('hareket');
    bildirimEkle('Toplu Hareket',''+islemler.length+' parça için '+tip+' hareketi kaydedildi.','success');
    alert('✅ '+islemler.length+' parça için hareket kaydedildi.');
  }catch(e){alert('Hata: '+e.message);}
}


// ── TOOLTIP SİSTEMİ ─────────────────────────────────────────────
(function(){
  var box = document.createElement('div');
  box.id = 'tt-box';
  document.body.appendChild(box);

  document.addEventListener('mouseover', function(e){
    var el = e.target.closest('[data-tip]');
    if(!el) return;
    box.textContent = el.getAttribute('data-tip');
    box.style.opacity = '1';
    positionTip(e, el);
  });

  document.addEventListener('mousemove', function(e){
    var el = e.target.closest('[data-tip]');
    if(!el){ box.style.opacity='0'; return; }
    positionTip(e, el);
  });

  document.addEventListener('mouseout', function(e){
    var el = e.target.closest('[data-tip]');
    if(!el) return;
    box.style.opacity = '0';
  });

  function positionTip(e, el){
    var bw = box.offsetWidth || 180;
    var bh = box.offsetHeight || 36;
    var x = e.clientX - bw/2;
    var y = e.clientY - bh - 12;
    // Sağa taşmasın
    if(x + bw > window.innerWidth - 8) x = window.innerWidth - bw - 8;
    if(x < 8) x = 8;
    // Üstte yer yoksa altta göster
    if(y < 8) y = e.clientY + 16;
    box.style.left = x + 'px';
    box.style.top  = y + 'px';
  }
})();

async function saveParca(id){
  const g=x=>document.getElementById(x);
  const k=g('f-kod').value.trim().toUpperCase(),ad=g('f-ad').value.trim();
  if(!k||!ad){alert('Parça kodu ve adı zorunludur!');return;}
  const fg=parseFloat(g('f-fiyat').value)||0,pb=g('f-pb').value;
  const obj={kod:k,ad,kategori:g('f-kat').value,ekipman:g('f-ekp').value,birim_fiyat:fg*(DKUR[pb]||1),birim_fiyat_giris:fg,pb,birim:g('f-birim').value||'Adet',min_stok:parseInt(g('f-min').value)||0,baslangic:parseInt(g('f-bas').value)||0,tedarikci:g('f-ted').value,teslimat:parseInt(g('f-tes').value)||0,notlar:g('f-not').value};
  try{
    if(id) await sbUpdate('parcalar',id,obj);
    else await sbInsert('parcalar',obj);
    // Fotoğraf varsa yükle
    var fotoInput = document.getElementById('f-foto');
    if(fotoInput && fotoInput.files && fotoInput.files[0]){
      await fotografYukle(fotoInput.files[0], obj.kod);
    }
    closeModal();
    await refreshAll('stok');
  }catch(e){alert('Hata: '+e.message);}
}

async function parcaSil(id,kod){
  var harSay=hareketler.filter(h=>h.par_kod===kod).length;
  var sipSay=siparisler.filter(s=>s.par_kod===kod).length;
  var uyari='"'+kod+'" kodlu parçayı silmek istediğinize emin misiniz?';
  if(harSay>0||sipSay>0) uyari+='\n\n⚠ Bu parçaya ait '+harSay+' hareket ve '+sipSay+' sipariş kaydı da silinecek!';
  if(!confirm(uyari))return;
  await sbDelete('parcalar',id);
  seciliParcalar.delete(id);
  await refreshAll('stok');
}

async function showEOQGrafik(parId){
  var p=parcalar.find(function(x){return x.id===parId;});
  if(!p) return;
  var D=p.yillik_talep||1, S=p.siparis_maliyet||50, H=p.birim_fiyat*EOQ_H||1;
  var eoq=Math.max(1,Math.round(Math.sqrt(2*D*S/H)));
  
  document.getElementById('modal-container').innerHTML=
    '<div class="modal-overlay"><div class="modal" style="width:600px">'
    +'<div class="modal-title">📊 EOQ Maliyet Analizi — '+p.kod+' '+trTitle(p.ad)+'</div>'
    +'<div style="position:relative;height:280px"><canvas id="eoq-chart"></canvas></div>'
    +'<div class="grid-3" style="margin-top:16px">'
    +'<div style="text-align:center;padding:10px;background:var(--bg3);border-radius:8px"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">EOQ</div><div style="font-size:20px;font-weight:700;color:var(--blue)">'+eoq+' adet</div></div>'
    +'<div style="text-align:center;padding:10px;background:var(--bg3);border-radius:8px"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">Yıllık Sipariş</div><div style="font-size:20px;font-weight:700;color:var(--gold)">'+Math.round(D/eoq)+'x</div></div>'
    +'<div style="text-align:center;padding:10px;background:var(--bg3);border-radius:8px"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">Min Toplam Maliyet</div><div style="font-size:20px;font-weight:700;color:var(--green)">'+eur(Math.round(Math.sqrt(2*D*S*H)))+'</div></div>'
    +'</div>'
    +'<div class="modal-footer"><button class="btn" onclick="closeModal()">Kapat</button></div>'
    +'</div></div>';

  setTimeout(function(){
    var ctx=document.getElementById('eoq-chart');
    if(!ctx) return;
    var points=[];
    for(var q=Math.max(1,Math.round(eoq*0.2));q<=eoq*3;q+=Math.max(1,Math.round(eoq*0.1))){
      var sipMal=(D/q)*S;
      var tutMal=(q/2)*H;
      points.push({q:q,sip:Math.round(sipMal),tut:Math.round(tutMal),top:Math.round(sipMal+tutMal)});
    }
    new Chart(ctx,{
      type:'line',
      data:{
        labels:points.map(function(x){return x.q;}),
        datasets:[
          {label:'Sipariş Maliyeti',data:points.map(function(x){return x.sip;}),borderColor:'#3b82f6',fill:false,tension:.4,pointRadius:0},
          {label:'Tutma Maliyeti',data:points.map(function(x){return x.tut;}),borderColor:'#f59e0b',fill:false,tension:.4,pointRadius:0},
          {label:'Toplam Maliyet',data:points.map(function(x){return x.top;}),borderColor:'#10b981',fill:false,tension:.4,borderWidth:2.5,pointRadius:0}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top',labels:{boxWidth:10,padding:14}}},
        scales:{
          x:{title:{display:true,text:'Sipariş Miktarı (adet)',font:{size:11}},grid:{display:false}},
          y:{title:{display:true,text:'Maliyet (€)',font:{size:11}},grid:{color:'rgba(0,0,0,.05)'}}
        },
        annotation:{annotations:[{type:'line',xMin:eoq,xMax:eoq,borderColor:'#ef4444',borderWidth:2,borderDash:[4,4],label:{content:'EOQ='+eoq,display:true}}]}
      }
    });
  },100);
}

async function updateEOQ(id,alan,val){
  const p=parcalar.find(x=>x.id===id);
  if(p){p[alan]=parseFloat(val)||0;await sbUpdate('parcalar',id,{[alan]:p[alan]});}
}

async function saveSip(){
  const pk=document.getElementById('s-par').value,mik=parseInt(document.getElementById('s-mik').value)||1;
  const p=parcalar.find(x=>x.kod===pk),fiy=parseFloat(document.getElementById('s-fiy').value)||p?.birim_fiyat||0;
  if(!pk){alert('Parça seçin!');return;}
  try{await sbInsert('siparisler',{sip_no:document.getElementById('s-no').value,par_kod:pk,par_ad:p?.ad||'',miktar:mik,tutar:mik*fiy,sip_tarih:document.getElementById('s-sip').value||null,tes_tarih:document.getElementById('s-tes').value||null,durum:'Beklemede',notlar:document.getElementById('s-not').value});closeModal();await refreshAll('siparis');}catch(e){alert('Hata: '+e.message);}
}

async function updSipDurum(id,d){
  var s=siparisler.find(x=>x.id===id);
  var eskiDurum=s?s.durum:'';
  await sbUpdate('siparisler',id,{durum:d});
  if(s) s.durum=d;
  // Tamamlandı yapılınca otomatik GİRİŞ hareketi oluştur
  if(d==='Tamamlandı' && eskiDurum!=='Tamamlandı' && s){
    var onay=confirm(s.par_kod+' — '+s.miktar+' adet stoka girişi yapılsın mı?');
    if(onay){
      try{
        await sbInsert('hareketler',{
          par_kod:s.par_kod,
          tip:'GİRİŞ',
          miktar:s.miktar,
          tarih:new Date().toISOString().slice(0,10),
          kullanan:'Sipariş #'+s.sip_no,
          i_emri:s.sip_no,
          aciklama:'Sipariş tamamlandı — otomatik giriş'
        });
        await refreshAll('siparis');
        alert('✅ '+s.par_kod+' için '+s.miktar+' adet stoka eklendi.');
      }catch(e){alert('Stok girişi yapılamadı: '+e.message);}
    }
  }
}

function renderTedarikciler(){
  document.getElementById('topbar-actions').innerHTML='<button class="btn btn-primary" onclick="showTedarikcModal()">+ Yeni Tedarikçi</button>';

  // Parçalardan tedarikçi listesi çıkar
  var tedMap={};
  parcalar.forEach(function(p){
    if(!p.tedarikci) return;
    if(!tedMap[p.tedarikci]) tedMap[p.tedarikci]={ad:p.tedarikci,parcaSay:0,toplamDeger:0,aktifSip:0,parcalar:[]};
    tedMap[p.tedarikci].parcaSay++;
    tedMap[p.tedarikci].toplamDeger+=mevcut(p.kod)*p.birim_fiyat;
    tedMap[p.tedarikci].parcalar.push(p);
  });
  siparisler.forEach(function(s){
    if(s.tedarikci && tedMap[s.tedarikci] && (s.durum==='Beklemede'||s.durum==='Kargoda'))
      tedMap[s.tedarikci].aktifSip++;
  });

  var tedList=Object.values(tedMap).sort(function(a,b){return b.toplamDeger-a.toplamDeger;});

  var rows=tedList.map(function(t){
    return '<tr>'
      +'<td><span style="font-weight:600;color:var(--text)">'+t.ad+'</span></td>'
      +'<td style="color:var(--text2)">'+t.parcaSay+' parça</td>'
      +'<td style="color:var(--gold);font-weight:500">'+eur(t.toplamDeger)+'</td>'
      +'<td>'+(t.aktifSip>0?'<span class="badge badge-blue">'+t.aktifSip+' aktif sipariş</span>':'<span class="badge badge-gray">—</span>')+'</td>'
      +"<td><button class='btn btn-sm' onclick='tedDetayBtn(this)' data-ad='"+t.ad+"'>Detay</button></td>"
      +'</tr>';
  }).join('');

  document.getElementById('content').innerHTML=`

  <div class="kpi"><div class="kpi-icon blue">🏭</div><div class="kpi-label">Toplam Tedarikçi</div><div class="kpi-value" style="color:var(--blue)">${tedList.length}</div></div>
  <div class="kpi"><div class="kpi-icon gold">📦</div><div class="kpi-label">Tedarikçili Parça</div><div class="kpi-value" style="color:var(--gold)">${parcalar.filter(p=>p.tedarikci).length}</div></div>
  <div class="kpi"><div class="kpi-icon green">🛒</div><div class="kpi-label">Aktif Siparişler</div><div class="kpi-value" style="color:var(--green)">${siparisler.filter(s=>s.durum==='Beklemede'||s.durum==='Kargoda').length}</div></div>
</div>
<div class="card" style="padding:0;overflow:hidden">
  <table>
    <thead><tr><th>Tedarikçi Adı</th><th>Parça Sayısı</th><th>Stok Değeri</th><th>Sipariş Durumu</th><th>İşlem</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="5"><div class="empty">Henüz tedarikçi eklenmemiş</div></td></tr>'}</tbody>
  </table>
</div>`;
}

      +'<td style="font-size:12px">'+trTitle(p.ad)+'</td>'
      +'<td style="font-size:11px;color:var(--text3)">'+( p.ekipman||'—')+'</td>'
      +'<td style="text-align:center"><b style="color:'+(m<=0?'var(--red)':m<=(p.min_stok||1)?'var(--gold)':'var(--green)')+'">'+m+'</b></td>'
      +'<td><input type="number" id="cc-'+p.id+'" min="0" placeholder="Sayılan" disabled '
      +'style="width:80px;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--text3);font-size:12px;text-align:center;font-family:DM Mono,monospace"></td>'
      +'<td id="cc-fark-'+p.id+'" style="font-size:12px;font-weight:600;text-align:center">—</td>'
      +'</tr>';
  }).join('');

  document.getElementById('content').innerHTML=`
<div class="alert alert-info" style="margin-bottom:16px">
  <span class="alert-icon">ℹ</span>
  <div><b>Cycle Count (Fiziksel Sayım)</b> — Sistemdeki stok miktarını fiziksel sayımla karşılaştırın. Fark varsa DÜZELTME hareketi otomatik oluşturulur.</div>
</div>
<div class="card" style="padding:0;overflow:hidden">
  <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg3)">
    <input type="checkbox" id="cc-tumu" onchange="ccTumunuSec(this.checked)" style="width:16px;height:16px;cursor:pointer">
    <span style="font-size:12px;font-weight:500;color:var(--text2)">Tümünü Seç</span>
    <span id="cc-secili-say" style="font-size:11px;color:var(--text3)"></span>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th style="width:36px"></th>
        <th>Kod</th><th>Parça Adı</th><th>Ekipman</th><th>Lokasyon</th>
        <th style="text-align:center">Sistem Stoğu</th>
        <th style="text-align:center">Sayılan Miktar</th>
        <th style="text-align:center">Fark</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
</div>`;

  // Checkbox değişince sayı alanını aktif et
  document.querySelectorAll('.cc-chk').forEach(function(chk){
    chk.addEventListener('change', function(){
      var id=this.dataset.id;
      var input=document.getElementById('cc-'+id);
      if(this.checked){
        input.disabled=false;
        input.style.background='var(--bg)';
        input.style.color='var(--text)';
        input.focus();
      } else {
        input.disabled=true;
        input.value='';
        input.style.background='var(--bg3)';
        input.style.color='var(--text3)';
        document.getElementById('cc-fark-'+id).innerHTML='—';
      }
      ccGuncelleSay();
    });
  });

  // Sayılan miktar girilince farkı göster
  parcalar.forEach(function(p){
    var input=document.getElementById('cc-'+p.id);
    if(!input) return;
    input.addEventListener('input', function(){
      var sayilan=parseInt(this.value);
      if(isNaN(sayilan)) return;
      var sistem=mevcut(p.kod);
      var fark=sayilan-sistem;
      var el=document.getElementById('cc-fark-'+p.id);
      if(fark===0) el.innerHTML='<span style="color:var(--green)">✓ Eşit</span>';
      else if(fark>0) el.innerHTML='<span style="color:var(--blue)">+'+fark+' Fazla</span>';
      else el.innerHTML='<span style="color:var(--red)">'+fark+' Eksik</span>';
      document.getElementById('cc-kaydet-btn').style.display='';
    });
  });
}

function ccTumunuSec(durum){
  document.querySelectorAll('.cc-chk').forEach(function(chk){
    chk.checked=durum;
    var id=chk.dataset.id;
    var input=document.getElementById('cc-'+id);
    if(input){
      input.disabled=!durum;
      input.style.background=durum?'var(--bg)':'var(--bg3)';
      input.style.color=durum?'var(--text)':'var(--text3)';
    }
  });
  ccGuncelleSay();
}

function ccGuncelleSay(){
  var say=document.querySelectorAll('.cc-chk:checked').length;
  var el=document.getElementById('cc-secili-say');
  if(el) el.textContent=say>0?say+' parça seçili':'';
}

function ccBaslat(){
  document.querySelectorAll('.cc-chk').forEach(function(chk){
    chk.checked=false;
    var input=document.getElementById('cc-'+chk.dataset.id);
    if(input){input.disabled=true;input.value='';input.style.background='var(--bg3)';input.style.color='var(--text3)';}
    var fark=document.getElementById('cc-fark-'+chk.dataset.id);
    if(fark) fark.innerHTML='—';
  });
  document.getElementById('cc-tumu').checked=false;
  document.getElementById('cc-kaydet-btn').style.display='none';
  ccGuncelleSay();
}

async function ccKaydet(){
  var bugun=new Date().toISOString().slice(0,10);
  var sayimlar=[];
  document.querySelectorAll('.cc-chk:checked').forEach(function(chk){
    var id=chk.dataset.id;
    var p=parcalar.find(function(x){return x.id===id;});
    if(!p) return;
    var input=document.getElementById('cc-'+id);
    if(!input||input.value==='') return;
    var sayilan=parseInt(input.value);
    if(isNaN(sayilan)) return;
    var sistem=mevcut(p.kod);
    var fark=sayilan-sistem;
    if(fark!==0) sayimlar.push({p:p, fark:fark, sayilan:sayilan});
  });

  if(sayimlar.length===0){alert('Fark bulunamadı veya hiçbir parça seçilmedi.');return;}

  var onay=confirm(sayimlar.length+' parçada fark bulundu. Düzeltme hareketleri oluşturulsun mu?\n\n'
    +sayimlar.map(function(s){return s.p.kod+': '+mevcut(s.p.kod)+' -> '+s.sayilan+' ('+(s.fark>0?'+':'')+s.fark+')';}).join('\n'));
  if(!onay) return;

  try{
    for(var i=0;i<sayimlar.length;i++){
      var s=sayimlar[i];
      await sbInsert('hareketler',{
        par_kod:s.p.kod,
        tip:'DÜZELTME',
        miktar:s.sayilan,
        tarih:bugun,
        kullanan:'Cycle Count',
        i_emri:'CC-'+bugun,
        aciklama:'Fiziksel sayım: Sistem='+mevcut(s.p.kod)+', Sayılan='+s.sayilan+', Fark='+(s.fark>0?'+':'')+s.fark
      });
    }
    await refreshAll('cyclecount');
    updateBadge();
    alert('✅ '+sayimlar.length+' düzeltme hareketi kaydedildi.');
  }catch(e){alert('Hata: '+e.message);}
}

function renderRaporlar(){
  var raporBasStr=localStorage.getItem('raporBas')||new Date(new Date().setMonth(new Date().getMonth()-3)).toISOString().slice(0,10);
  var raporBitStr=localStorage.getItem('raporBit')||new Date().toISOString().slice(0,10);
  document.getElementById('topbar-actions').innerHTML=
    '<input type="date" id="rapor-bas" value="'+raporBasStr+'" title="Başlangıç tarihi" onchange="localStorage.setItem(\'raporBas\',this.value);renderRaporlar()" style="padding:5px 8px;border-radius:5px;border:1px solid var(--border);font-size:11px;background:var(--bg2);color:var(--text2);width:120px">'
    +'<input type="date" id="rapor-bit" value="'+raporBitStr+'" title="Bitiş tarihi" onchange="localStorage.setItem(\'raporBit\',this.value);renderRaporlar()" style="padding:5px 8px;border-radius:5px;border:1px solid var(--border);font-size:11px;background:var(--bg2);color:var(--text2);width:120px">'
    +'<button class="btn" onclick="localStorage.removeItem(\'raporBas\');localStorage.removeItem(\'raporBit\');renderRaporlar()">↺</button>'
    +'<button class="btn" onclick="refreshAll(\'raporlar\')">↻ Yenile</button>'
    +'<button class="btn btn-primary" onclick="excelIndir()">⬇ Excel</button>';

  // Hesaplamalar
  var rBas=document.getElementById('rapor-bas')?document.getElementById('rapor-bas').value:(localStorage.getItem('raporBas')||'2000-01-01');
  var rBit=document.getElementById('rapor-bit')?document.getElementById('rapor-bit').value:(localStorage.getItem('raporBit')||new Date().toISOString().slice(0,10));
  var filtHar2=hareketler.filter(function(h){return (!h.tarih||(h.tarih>=rBas&&h.tarih<=rBit));});
  var filtSip2=siparisler.filter(function(s){return (!s.sip_tarih||(s.sip_tarih>=rBas&&s.sip_tarih<=rBit));});
  var toplamDeger=parcalar.reduce(function(s,p){return s+mevcut(p.kod)*p.birim_fiyat;},0);
  var toplamCikis=filtHar2.filter(function(h){return h.tip==='ÇIKIŞ';}).reduce(function(s,h){return s+(Number(h.miktar)||0);},0);
  var toplamSip=filtSip2.reduce(function(s,x){return s+(x.tutar||0);},0);
  var tamSip=filtSip2.filter(function(s){return s.durum==='Tamamlandı';}).length;

  // Aylık çıkış (son 6 ay)
  var aylar=[];
  for(var i=5;i>=0;i--){var d=new Date();d.setMonth(d.getMonth()-i);aylar.push({yil:d.getFullYear(),ay:d.getMonth()+1,label:d.toLocaleString('tr-TR',{month:'short'})});}
  var aylikCikis=aylar.map(function(a){
    return filtHar2.filter(function(h){
      if(h.tip!=='ÇIKIŞ'||!h.tarih) return false;
      var hd=new Date(h.tarih);
      return hd.getFullYear()===a.yil&&hd.getMonth()+1===a.ay;
    }).reduce(function(s,h){return s+(Number(h.miktar)||0);},0);
  });
  var aylikGiris=aylar.map(function(a){
    return filtHar2.filter(function(h){
      if(h.tip!=='GİRİŞ'||!h.tarih) return false;
      var hd=new Date(h.tarih);
      return hd.getFullYear()===a.yil&&hd.getMonth()+1===a.ay;
    }).reduce(function(s,h){return s+(Number(h.miktar)||0);},0);
  });

  // ABC dağılımı
  var abcSay={A:0,B:0,C:0};
  var abcDeger={A:0,B:0,C:0};
  parcalar.forEach(function(p){
    var k=abc(p.birim_fiyat,p.kod);
    abcSay[k]++;
    abcDeger[k]+=mevcut(p.kod)*p.birim_fiyat;
  });

  // Tedarikçi bazlı stok değeri (top 5)
  var tedDeger={};
  parcalar.forEach(function(p){
    var t=p.tedarikci||'Belirtilmemiş';
    tedDeger[t]=(tedDeger[t]||0)+mevcut(p.kod)*p.birim_fiyat;
  });
  var tedList=Object.entries(tedDeger).sort(function(a,b){return b[1]-a[1];}).slice(0,5);

  document.getElementById('content').innerHTML=`
<div class="grid-4" style="margin-bottom:20px">
  <div class="kpi"><div class="kpi-icon blue">📦</div><div class="kpi-label">Toplam Stok Değeri</div><div class="kpi-value" style="color:var(--blue)">${eur(toplamDeger)}</div></div>
  <div class="kpi"><div class="kpi-icon red">📤</div><div class="kpi-label">Toplam Çıkış</div><div class="kpi-value" style="color:var(--red)">${toplamCikis} adet</div></div>
  <div class="kpi"><div class="kpi-icon gold">🛒</div><div class="kpi-label">Toplam Sipariş</div><div class="kpi-value" style="color:var(--gold)">${eur(toplamSip)}</div></div>
  <div class="kpi"><div class="kpi-icon green">✅</div><div class="kpi-label">Tamamlanan Sipariş</div><div class="kpi-value" style="color:var(--green)">${tamSip}</div></div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="section-title">Aylık Stok Hareketi (Son 6 Ay)</div>
    <div style="position:relative;height:220px">
      <canvas id="chart-aylik"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="section-title">ABC Sınıfı Dağılımı</div>
    <div style="position:relative;height:220px;display:flex;align-items:center;justify-content:center">
      <canvas id="chart-abc" style="max-width:220px;max-height:220px"></canvas>
    </div>
  </div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="section-title">Tedarikçi Bazlı Stok Değeri (Top 5)</div>
    <div style="position:relative;height:200px">
      <canvas id="chart-ted"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="section-title">Sipariş Durumu Dağılımı</div>
    <div style="position:relative;height:200px;display:flex;align-items:center;justify-content:center">
      <canvas id="chart-sip" style="max-width:200px;max-height:200px"></canvas>
    </div>
  </div>
</div>`;

  // Chart.js yükle ve çiz
  if(typeof Chart==='undefined'){
    var sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
    sc.onload=function(){cizGrafikleri(aylar,aylikCikis,aylikGiris,abcSay,abcDeger,tedList);};
    document.head.appendChild(sc);
  } else {
    cizGrafikleri(aylar,aylikCikis,aylikGiris,abcSay,abcDeger,tedList);
  }
}

function cizGrafikleri(aylar,aylikCikis,aylikGiris,abcSay,abcDeger,tedList){
  Chart.defaults.font.family="'DM Sans',sans-serif";
  Chart.defaults.font.size=11;
  Chart.defaults.color='#94a3b8';

  // 1. Aylık hareket — çubuk grafik
  var ctx1=document.getElementById('chart-aylik');
  if(ctx1){
    new Chart(ctx1,{
      type:'bar',
      data:{
        labels:aylar.map(function(a){return a.label;}),
        datasets:[
          {label:'Çıkış',data:aylikCikis,backgroundColor:'rgba(239,68,68,0.7)',borderRadius:4},
          {label:'Giriş',data:aylikGiris,backgroundColor:'rgba(16,185,129,0.7)',borderRadius:4}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'top',labels:{boxWidth:10,padding:16}}},
        scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{stepSize:1}}}
      }
    });
  }

  // 2. ABC dağılımı — donut
  var ctx2=document.getElementById('chart-abc');
  if(ctx2){
    new Chart(ctx2,{
      type:'doughnut',
      data:{
        labels:['Sınıf A','Sınıf B','Sınıf C'],
        datasets:[{
          data:[abcSay.A,abcSay.B,abcSay.C],
          backgroundColor:['#ef4444','#f59e0b','#94a3b8'],
          borderWidth:0,hoverOffset:4
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,cutout:'65%',
        plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:14}}}
      }
    });
  }

  // 3. Tedarikçi — yatay çubuk
  var ctx3=document.getElementById('chart-ted');
  if(ctx3&&tedList.length){
    new Chart(ctx3,{
      type:'bar',
      data:{
        labels:tedList.map(function(x){return x[0].length>15?x[0].slice(0,15)+'…':x[0];}),
        datasets:[{
          label:'Stok Değeri (€)',
          data:tedList.map(function(x){return Number(x[1].toFixed(2));}),
          backgroundColor:'rgba(59,130,246,0.7)',borderRadius:4
        }]
      },
      options:{
        indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{callback:function(v){return '€'+v.toLocaleString('tr-TR');}}},y:{grid:{display:false}}}
      }
    });
  }

  // 4. Sipariş durumu — donut
  var ctx4=document.getElementById('chart-sip');
  if(ctx4){
    var sipDurum={Beklemede:0,Kargoda:0,'Tamamlandı':0,'İptal':0};
    siparisler.forEach(function(s){if(sipDurum[s.durum]!==undefined)sipDurum[s.durum]++;});
    new Chart(ctx4,{
      type:'doughnut',
      data:{
        labels:Object.keys(sipDurum),
        datasets:[{
          data:Object.values(sipDurum),
          backgroundColor:['#f59e0b','#3b82f6','#10b981','#94a3b8'],
          borderWidth:0,hoverOffset:4
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,cutout:'65%',
        plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:14}}}
      }
    });
  }
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}

(async()=>{await loadAll();updateBadge();navigate('dashboard');})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
function excelIndir(){
  // SheetJS ile Excel oluştur
  if(typeof XLSX === 'undefined'){
    alert('Excel kütüphanesi yükleniyor, lütfen bekleyin...');
    return;
  }
  var wb = XLSX.utils.book_new();

  // 1. Stok Verileri sayfası
  var stokData = [['Parça Kodu','Parça Adı','Kategori','Ekipman','Mevcut Stok','Min Stok','Birim Fiyat (€)','Toplam Değer (€)','ABC','Tedarikçi','Teslimat (gün)','Kritik']];
  parcalar.forEach(function(p){
    var m=mevcut(p.kod);
    stokData.push([p.kod,p.ad,p.kategori||'',p.ekipman||'',m,p.min_stok||0,Number(p.birim_fiyat||0).toFixed(2),Number(m*p.birim_fiyat).toFixed(2),abc(p.birim_fiyat,p.kod),p.tedarikci||'',p.teslimat||0,p.kritik?'Evet':'Hayır']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(stokData), 'Stok Verileri');

  // 2. Kritik Parçalar sayfası
  var kritikData = [['Parça Kodu','Parça Adı','Ekipman','Stok','Min Stok','ROP','Birim Fiyat (€)','ABC','Tedarikçi','Teslimat (gün)','Durum']];
  parcalar.forEach(function(p){
    var m=mevcut(p.kod);
    var talep=p.yillik_talep||1, teslimat=p.teslimat||0;
    var ss=Math.max(1,Math.round(EOQ_K*EOQ_S*Math.sqrt(teslimat||14)));
    var rop=Math.max(1,Math.round((talep/365)*teslimat+ss));
    var abcS=abc(p.birim_fiyat,p.kod);
    var nedenler=[];
    if(p.kritik) nedenler.push('Manuel');
    if(m<=0) nedenler.push('Tükendi');
    else if(m<=(p.min_stok||1)) nedenler.push('Min Stok Altı');
    if(teslimat>0&&m<=rop&&m>(p.min_stok||1)) nedenler.push('ROP Altı');
    if(teslimat>=30&&m<=ss&&m>(p.min_stok||1)) nedenler.push('Uzun Temin');
    if(abcS==='A'&&m<=(p.min_stok||1)*2&&m>(p.min_stok||1)) nedenler.push('A Sınıfı Düşük');
    if(nedenler.length===0) return;
    var durum=m<=0?'ACİL SİPARİŞ':m<=(p.min_stok||1)?'KRİTİK':'UYARI';
    kritikData.push([p.kod,p.ad,p.ekipman||'',m,p.min_stok||0,rop,Number(p.birim_fiyat||0).toFixed(2),abcS,p.tedarikci||'',teslimat,nedenler.join(', '),durum]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(kritikData), 'Kritik Yedek Parçalar');

  // 3. Sipariş Takip sayfası
  var sipData = [['Sipariş No','Parça Kodu','Parça Adı','Tedarikçi','Miktar','Tutar (€)','Sipariş Tarihi','Tahmini Teslimat','Durum']];
  siparisler.forEach(function(s){
    var p=parcalar.find(function(x){return x.kod===s.par_kod;})||{};
    sipData.push([s.sip_no,s.par_kod,p.ad||s.par_ad||'',p.tedarikci||'',s.miktar,Number(s.tutar||0).toFixed(2),s.sip_tarih||'',s.tes_tarih||'',s.durum]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sipData), 'Sipariş Takip');

  // 4. Hareket Log sayfası
  var harData = [['Tarih','Parça Kodu','Parça Adı','Kullanan','Hareket Tipi','Miktar','İş Emri','Açıklama']];
  hareketler.forEach(function(h){
    var p=parcalar.find(function(x){return x.kod===h.par_kod;})||{};
    harData.push([h.tarih||'',h.par_kod,p.ad||'',h.kullanan||'',h.tip,h.miktar,h.i_emri||'',h.aciklama||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(harData), 'Hareket Log');

  // Dosyayı indir
  var tarih = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, 'StokTakip_Rapor_'+tarih+'.xlsx');
}
</script>
